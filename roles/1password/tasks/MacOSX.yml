---
- name: "1Password | MacOSX | Install 1Password"
  community.general.homebrew_cask:
    name: "{{ item }}"
    state: present
  loop:
    - 1password
    - 1password-cli

- name: "1Password | MacOSX | Detect 1Password CLI after install"
  ansible.builtin.command:
    cmd: which op
  changed_when: false
  failed_when: false
  register: op_binary_check

- name: "1Password | MacOSX | Register CLI availability"
  ansible.builtin.set_fact:
    op_installed: "{{ op_binary_check.rc == 0 }}"

- name: "1Password | MacOSX | Detect authentication state"
  ansible.builtin.command:
    argv:
      - op
      - vault
      - list
      - --account
      - my.1password.com
      - --format
      - json
  changed_when: false
  failed_when: false
  register: op_whoami
  when: op_installed

- name: "1Password | MacOSX | Register authentication state"
  ansible.builtin.set_fact:
    op_authenticated: "{{ op_whoami.rc == 0 }}"
  when: op_installed

- name: "1Password | MacOSX | Explain next step when not authenticated"
  ansible.builtin.debug:
    msg:
      - "1Password is installed, but the CLI is not authenticated yet."
      - "Open 1Password, sign in or unlock it, then rerun: dotfiles -t 1password,ssh,git,jj,fonts"
  when:
    - op_installed
    - not (op_authenticated | default(false))
