---
- name: "{{ role_name }} | macOS | Add FelixKratz tap"
  community.general.homebrew_tap:
    name: FelixKratz/formulae
    state: present

- name: "{{ role_name }} | macOS | Check Homebrew tap trust requirement"
  ansible.builtin.command: brew config
  register: borders_brew_config
  changed_when: false
  check_mode: false

- name: "{{ role_name }} | macOS | Check trusted Homebrew formulae"
  ansible.builtin.command: brew trust --json v1
  register: borders_brew_trust
  changed_when: false
  check_mode: false
  when: "'HOMEBREW_REQUIRE_TAP_TRUST: set' in borders_brew_config.stdout"

- name: "{{ role_name }} | macOS | Trust borders Homebrew formula"
  ansible.builtin.command: brew trust --formula felixkratz/formulae/borders
  changed_when: true
  when:
    - "'HOMEBREW_REQUIRE_TAP_TRUST: set' in borders_brew_config.stdout"
    - >
      'felixkratz/formulae/borders' not in
      ((borders_brew_trust.stdout | default('{"formulae": []}') | from_json).formulae | default([]))

- name: "{{ role_name }} | macOS | Install borders"
  community.general.homebrew:
    name: borders
    state: present

- name: "{{ role_name }} | macOS | Create borders config directory"
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/borders"
    state: directory
    mode: '0755'

- name: "{{ role_name }} | macOS | Deploy bordersrc configuration"
  ansible.builtin.copy:
    src: bordersrc
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/borders/bordersrc"
    mode: '0755'
    backup: yes
  notify: "borders | macOS | Restart borders service"

- name: "{{ role_name }} | macOS | Check if borders service is running"
  ansible.builtin.command: brew services list
  register: brew_services
  changed_when: false

- name: "{{ role_name }} | macOS | Start borders service"
  ansible.builtin.command: brew services start borders
  when: "'borders stopped' in brew_services.stdout or 'borders none' in brew_services.stdout"
  changed_when: true
