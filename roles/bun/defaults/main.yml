---
# Bun JavaScript runtime defaults
# https://bun.sh/

# Shared Bun global packages. Keep JavaScript-distributed language servers here
# instead of scattering them across agent roles.
bun_global_packages:
  - typescript
  - typescript-language-server
  - yaml-language-server
  - bash-language-server
  - pyright
  - "@ansible/ansible-language-server"
  - dockerfile-language-server-nodejs
  - "@tailwindcss/language-server"
  - "@astrojs/language-server"
  - graphql-language-service-cli
  - svelte-language-server
  - vscode-langservers-extracted
  - "@biomejs/biome"
  - "@vue/language-server"
  - "@prisma/language-server"
  - vim-language-server
  - "@olrtg/emmet-language-server"
  - intelephense

# Additional packages can be added in group_vars/all.yml like:
# bun_extra_packages:
#   - prettier
bun_extra_packages: []

bun_bin_candidates:
  - "{{ ansible_facts['env']['HOME'] }}/.bun/bin/bun"
  - /opt/homebrew/bin/bun
  - /usr/local/bin/bun
  - /usr/bin/bun
bun_install_root: >-
  {{ ansible_facts['env']['BUN_INSTALL'] | default(ansible_facts['env']['HOME'] ~ '/.bun', true) }}
bun_global_node_modules_dir: "{{ bun_install_root }}/install/global/node_modules"
