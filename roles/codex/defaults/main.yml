---
role_name: codex
codex_install_path: "{{ ansible_facts['env']['HOME'] }}/.local/bin"
codex_agents_source: "{{ role_path }}/files/AGENTS.md"
codex_agents_dest: "{{ ansible_facts['env']['HOME'] }}/.codex/AGENTS.md"
codex_config_source: "{{ role_path }}/files/config.toml"
codex_config_dest: "{{ ansible_facts['env']['HOME'] }}/.codex/config.toml"
codex_custom_agents_source: "{{ role_path }}/files/agents"
codex_custom_agents_dest: "{{ ansible_facts['env']['HOME'] }}/.codex/agents"
codex_custom_agents_manifest: "{{ codex_custom_agents_dest }}/.managed-by-dotfiles.json"
codex_skills_source: "{{ role_path }}/files/skills"
codex_skills_dest: "{{ ansible_facts['env']['HOME'] }}/.codex/skills"
codex_cleanup_legacy_official_skills: true
codex_legacy_official_skills_prefix: "{{ ansible_facts['env']['HOME'] }}/.local/share/codex/skills/openai-skills/skills/.curated/"
codex_legacy_official_skills_cache_dir: "{{ ansible_facts['env']['HOME'] }}/.local/share/codex/skills/openai-skills"
codex_external_plugins_root: "{{ ansible_facts['env']['HOME'] }}/.local/share/codex-external"
codex_caveman_enabled: true
codex_caveman_repo_url: "https://github.com/JuliusBrussee/caveman.git"
codex_caveman_version: "main"
codex_caveman_clone_path: "{{ codex_external_plugins_root }}/caveman"
codex_caveman_skills_root: "{{ codex_caveman_clone_path }}/plugins/caveman/skills"
codex_caveman_skill_names:
  - caveman
  - compress
