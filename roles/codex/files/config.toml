# Codex CLI config (managed by dotfiles role)
# Reference: https://developers.openai.com/codex/config-reference

# Minimal, high-quality defaults.
model_reasoning_effort = "xhigh"
# model_reasoning_summary = "detailed"
# model_verbosity = "high"
approval_policy = "on-request"
sandbox_mode = "danger-full-access"
web_search = "live"
# tool_output_token_limit = 120000
model = "gpt-5.5"
plan_mode_reasoning_effort = "xhigh"
service_tier = "default"
suppress_unstable_features_warning = true
personality = "pragmatic"

notify = ["/Users/MDegarmo/.codex/computer-use/Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient", "turn-ended"]

[features]
hooks = true
memories = true
js_repl = false

[agents]
max_threads = 12
max_depth = 2

# Keep local session history so resume/fork workflows stay useful.
[history]
persistence = "save-all"

[tui]
notifications = true
show_tooltips = false
status_line = ["model-with-reasoning", "git-branch", "pull-request-number", "branch-changes", "current-dir", "context-used", "five-hour-limit"]
theme = "catppuccin-mocha"

[tui.keymap.editor]
insert_newline = "alt-enter"

[mcp_servers.playwright]
command = "bunx"
args = ["@playwright/mcp@latest"]

[mcp_servers.node_repl]
args = []
command = "/Applications/ChatGPT.app/Contents/Resources/cua_node/bin/node_repl"
startup_timeout_sec = 120

[mcp_servers.node_repl.env]
NODE_REPL_NATIVE_PIPE_CONNECT_TIMEOUT_MS = "1000"
NODE_REPL_NODE_MODULE_DIRS = "/Applications/ChatGPT.app/Contents/Resources/cua_node/lib/node_modules"
NODE_REPL_NODE_PATH = "/Applications/ChatGPT.app/Contents/Resources/cua_node/bin/node"
NODE_REPL_TRUSTED_CODE_PATHS = "/Users/MDegarmo/.codex"
CODEX_HOME = "/Users/MDegarmo/.codex"
NODE_REPL_TRUSTED_BROWSER_CLIENT_SHA256S = "2b020a2faded171bf620563ce51864b7c3ff320f1834f0044b73fcbeabb29a76,6d25aa7656feac858f3a3bdaea5bcbab0dbfd426c9de8e6931ce90c399ee8e4f"
BROWSER_USE_AVAILABLE_BACKENDS = "chrome,iab"
NODE_REPL_INSTRUCTIONS_USE_CASE_BROWSER = "Control the in-app browser in conjunction with the Browser Plugin."
NODE_REPL_INSTRUCTIONS_USE_CASE_CHROME = "Control the Chrome browser in conjunction with the Chrome Plugin. Prefer this method of controlling Chrome over alternatives (such as Computer Use) unless the user explicitly mentions an alternative."
NODE_REPL_INSTRUCTIONS_USE_CASE_COMPUTER_USE = "Control desktop apps on macOS through Computer Use."
BROWSER_USE_CODEX_APP_BUILD_FLAVOR = "prod"
BROWSER_USE_CODEX_APP_VERSION = "26.707.30751"
SKY_CUA_SERVICE_PATH = "/Users/MDegarmo/.codex/plugins/cache/openai-bundled/computer-use/1.0.1000362/Codex Computer Use.app"
CODEX_CLI_PATH = "/Applications/ChatGPT.app/Contents/Resources/codex"

[mcp_servers.computer-use]
command = "./Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient"
args = ["mcp"]
cwd = "."
enabled = false

# Export Codex telemetry to OpenMonitor.
# NOTE: Codex v0.106.0 does not interpolate env vars in [otel] fields.
# Values below are written literally. Rotate the API key if this file is shared.
[otel]
environment = "dev"
log_user_prompt = true
trace_exporter = "none"

[plugins."google-calendar@openai-curated"]
enabled = true

[plugins."gmail@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true

[plugins."granola@openai-curated"]
