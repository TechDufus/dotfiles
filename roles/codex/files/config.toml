# Codex CLI config (managed by dotfiles role)
# Reference: https://developers.openai.com/codex/config-reference

# Minimal, high-quality defaults.
model_reasoning_effort = "xhigh"
# model_reasoning_summary = "detailed"
# model_verbosity = "high"
approval_policy = "on-request"
sandbox_mode = "danger-full-access"
web_search = "live"
# tool_output_token_limit = 120000
model = "gpt-5.5"
plan_mode_reasoning_effort = "xhigh"
service_tier = "default"
suppress_unstable_features_warning = true
personality = "pragmatic"

[features]
memories = true

[agents]
max_threads = 12
max_depth = 2

# Keep local session history so resume/fork workflows stay useful.
[history]
persistence = "save-all"

[tui]
notifications = true
show_tooltips = false
status_line = ["model-with-reasoning", "git-branch", "pull-request-number", "branch-changes", "current-dir", "context-used", "five-hour-limit"]
theme = "catppuccin-mocha"

[tui.keymap.editor]
insert_newline = "alt-enter"

[mcp_servers.playwright]
command = "bunx"
args = ["@playwright/mcp@latest"]

# Export Codex telemetry to OpenMonitor.
# NOTE: Codex v0.106.0 does not interpolate env vars in [otel] fields.
# Values below are written literally. Rotate the API key if this file is shared.
[otel]
environment = "dev"
log_user_prompt = true
trace_exporter = "none"

[plugins."google-calendar@openai-curated"]
enabled = true

[plugins."gmail@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true

[plugins."granola@openai-curated"]
enabled = true

[plugins."superpowers@openai-curated"]
enabled = true

[plugins."computer-use@openai-bundled"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[plugins."cloudflare@openai-curated"]
enabled = true

[plugins."cloudflare@openai-curated".mcp_servers."cloudflare-api"]
enabled = false

[plugins."chrome@openai-bundled"]
enabled = true

[plugins."sites@openai-bundled"]
enabled = true

[plugins."pdf@openai-primary-runtime"]
enabled = true

[plugins."template-creator@openai-primary-runtime"]
enabled = true

[apps._default]
default_tools_approval_mode = "approve"

[memories]
disable_on_external_context = true

[projects."/Users/MDegarmo/dev/redhorse/atlas"]
trust_level = "trusted"

[projects."/Users/MDegarmo/.dotfiles"]
trust_level = "trusted"

[marketplaces.openai-primary-runtime]
last_updated = "2026-07-01T06:26:14Z"
source_type = "local"
source = "/Users/MDegarmo/.cache/codex-runtimes/codex-primary-runtime/plugins/openai-primary-runtime"
