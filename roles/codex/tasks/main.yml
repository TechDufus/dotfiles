---
- name: "{{ role_name }} | Checking for Distribution Config: {{ ansible_facts['distribution'] }}"
  ansible.builtin.stat:
    path: "{{ role_path }}/tasks/{{ ansible_facts['distribution'] }}.yml"
  register: distribution_config

- name: "{{ role_name }} | Run Tasks: {{ ansible_facts['distribution'] }}"
  ansible.builtin.include_tasks: "{{ ansible_facts['distribution'] }}.yml"
  when: distribution_config.stat.exists

- name: "{{ role_name }} | Configure | Ensure ~/.codex directory exists"
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.codex"
    state: directory
    mode: "0755"

- name: "{{ role_name }} | Agents | Ensure ~/.codex/agents directory exists"
  ansible.builtin.file:
    path: "{{ codex_custom_agents_dest }}"
    state: directory
    mode: "0755"

- name: "{{ role_name }} | Skills | Ensure ~/.codex/skills directory exists"
  ansible.builtin.file:
    path: "{{ codex_skills_dest }}"
    state: directory
    mode: "0755"

- name: "{{ role_name }} | Agents | Check custom agents source directory"
  ansible.builtin.stat:
    path: "{{ codex_custom_agents_source }}"
  register: codex_custom_agents_source_directory

- name: "{{ role_name }} | Agents | Find custom agent files in role files"
  ansible.builtin.find:
    paths: "{{ codex_custom_agents_source }}"
    file_type: file
    patterns: "*.toml"
    recurse: false
  register: codex_custom_agent_source_files
  when:
    - codex_custom_agents_source_directory.stat.exists
    - codex_custom_agents_source_directory.stat.isdir

- name: "{{ role_name }} | Agents | Set custom agent file names"
  ansible.builtin.set_fact:
    codex_custom_agent_names: >-
      {{
        ((codex_custom_agent_source_files | default({'files': []})).files)
        | map(attribute='path')
        | map('basename')
        | list
      }}

- name: "{{ role_name }} | Agents | Check managed-agent manifest"
  ansible.builtin.stat:
    path: "{{ codex_custom_agents_manifest }}"
  register: codex_custom_agents_manifest_file

- name: "{{ role_name }} | Agents | Read managed-agent manifest"
  ansible.builtin.slurp:
    path: "{{ codex_custom_agents_manifest }}"
  register: codex_custom_agents_manifest_slurp
  when: codex_custom_agents_manifest_file.stat.exists

- name: "{{ role_name }} | Agents | Set previously managed agent names"
  ansible.builtin.set_fact:
    codex_previous_custom_agent_names: >-
      {{
        (codex_custom_agents_manifest_slurp.content | b64decode | from_json)
        if codex_custom_agents_manifest_file.stat.exists
        else []
      }}

- name: "{{ role_name }} | Agents | Remove stale managed custom agent files"
  ansible.builtin.file:
    path: "{{ codex_custom_agents_dest }}/{{ codex_stale_custom_agent_name }}"
    state: absent
  loop: "{{ codex_previous_custom_agent_names | difference(codex_custom_agent_names) }}"
  loop_control:
    loop_var: codex_stale_custom_agent_name
    label: "{{ codex_stale_custom_agent_name }}"

- name: "{{ role_name }} | Agents | Check custom agent destination paths"
  ansible.builtin.stat:
    path: "{{ codex_custom_agents_dest }}/{{ codex_custom_agent_name }}"
    follow: false
  loop: "{{ codex_custom_agent_names | default([]) }}"
  loop_control:
    loop_var: codex_custom_agent_name
    label: "{{ codex_custom_agent_name }}"
  register: codex_custom_agent_destinations
  when: codex_custom_agent_names is defined

- name: "{{ role_name }} | Agents | Fail when custom agent destination is unmanaged"
  ansible.builtin.fail:
    msg: >-
      Custom Codex agent destination {{ codex_custom_agents_dest }}/{{ item.codex_custom_agent_name }}
      exists and is not managed by this role. Move or remove it, then rerun `dotfiles -t codex`.
  loop: "{{ codex_custom_agent_destinations.results | default([]) }}"
  loop_control:
    label: "{{ item.codex_custom_agent_name }}"
  when:
    - item.stat.exists
    - not item.stat.islnk
    - item.codex_custom_agent_name not in codex_previous_custom_agent_names

- name: "{{ role_name }} | Agents | Remove managed custom agent symlinks before copying"
  ansible.builtin.file:
    path: "{{ codex_custom_agents_dest }}/{{ item.codex_custom_agent_name }}"
    state: absent
  loop: "{{ codex_custom_agent_destinations.results | default([]) }}"
  loop_control:
    label: "{{ item.codex_custom_agent_name }}"
  when:
    - item.stat.exists
    - item.stat.islnk

- name: "{{ role_name }} | Agents | Copy custom agents from role files"
  ansible.builtin.copy:
    src: "{{ codex_custom_agent_source_file.path }}"
    dest: "{{ codex_custom_agents_dest }}/{{ codex_custom_agent_source_file.path | basename }}"
    remote_src: true
    mode: "0644"
  loop: "{{ codex_custom_agent_source_files.files | default([]) }}"
  loop_control:
    loop_var: codex_custom_agent_source_file
    label: "{{ codex_custom_agent_source_file.path | basename }}"

- name: "{{ role_name }} | Agents | Write managed-agent manifest"
  ansible.builtin.copy:
    content: "{{ codex_custom_agent_names | to_nice_json }}\n"
    dest: "{{ codex_custom_agents_manifest }}"
    mode: "0644"

- name: "{{ role_name }} | Skills | Find existing top-level skill entries"
  ansible.builtin.find:
    paths: "{{ codex_skills_dest }}"
    file_type: any
    recurse: false
  register: codex_skill_root_entries

- name: "{{ role_name }} | Skills | Stat top-level skill entries"
  ansible.builtin.stat:
    path: "{{ codex_skill_root_entry.path }}"
    follow: false
  loop: "{{ codex_skill_root_entries.files | default([]) }}"
  loop_control:
    loop_var: codex_skill_root_entry
    label: "{{ codex_skill_root_entry.path | basename }}"
  register: codex_skill_root_entry_stats
  when:
    - codex_skill_root_entry.path | basename != ".system"

- name: "{{ role_name }} | Skills | Remove legacy managed official skill symlinks"
  ansible.builtin.file:
    path: "{{ item.stat.path }}"
    state: absent
  loop: "{{ codex_skill_root_entry_stats.results | default([]) }}"
  loop_control:
    label: "{{ item.stat.path | basename }}"
  when:
    - codex_cleanup_legacy_official_skills
    - item.stat.exists
    - item.stat.islnk
    - item.stat.lnk_source | default('') | regex_search('^' ~ (codex_legacy_official_skills_prefix | regex_escape)) is not none

- name: "{{ role_name }} | Skills | Remove legacy managed official skills cache"
  ansible.builtin.file:
    path: "{{ codex_legacy_official_skills_cache_dir }}"
    state: absent
  when: codex_cleanup_legacy_official_skills

- name: "{{ role_name }} | Skills | Check custom skills source directory"
  ansible.builtin.stat:
    path: "{{ codex_skills_source }}"
  register: codex_skills_source_directory

- name: "{{ role_name }} | Skills | Find custom skills in role files"
  ansible.builtin.find:
    paths: "{{ codex_skills_source }}"
    file_type: directory
    recurse: false
  register: codex_skill_source_directories
  when:
    - codex_skills_source_directory.stat.exists
    - codex_skills_source_directory.stat.isdir

- name: "{{ role_name }} | Skills | Set custom skill names"
  ansible.builtin.set_fact:
    codex_skill_names: >-
      {{ codex_skill_source_directories.files | map(attribute='path') | map('basename') | list }}
  when:
    - codex_skills_source_directory.stat.exists
    - codex_skills_source_directory.stat.isdir

- name: "{{ role_name }} | Skills | Validate managed custom skills"
  ansible.builtin.command:
    argv:
      - "{{ ansible_playbook_python }}"
      - "{{ role_path }}/files/scripts/validate_skills.py"
      - "{{ codex_skills_source }}"
  changed_when: false
  when: codex_skill_names is defined

- name: "{{ role_name }} | Skills | Remove stale managed custom skill symlinks"
  ansible.builtin.file:
    path: "{{ item.stat.path }}"
    state: absent
  loop: "{{ codex_skill_root_entry_stats.results | default([]) }}"
  loop_control:
    label: "{{ item.stat.path | basename }}"
  when:
    - codex_skill_names is defined
    - item.stat.exists
    - item.stat.islnk
    - item.stat.lnk_source | default('') | regex_search('^' ~ (codex_skills_source | regex_escape) ~ '/') is not none
    - (item.stat.path | basename) not in (codex_skill_names | default([]))

- name: "{{ role_name }} | Skills | Check custom skill destination paths"
  ansible.builtin.stat:
    path: "{{ codex_skills_dest }}/{{ codex_skill_name }}"
  loop: "{{ codex_skill_names | default([]) }}"
  loop_control:
    loop_var: codex_skill_name
    label: "{{ codex_skill_name }}"
  register: codex_skill_destinations
  when: codex_skill_names is defined

- name: "{{ role_name }} | Skills | Fail when custom skill destination is not a symlink"
  ansible.builtin.fail:
    msg: >-
      Custom Codex skill destination {{ codex_skills_dest }}/{{ item.codex_skill_name }}
      exists and is not a symlink. Move or remove it, then rerun `dotfiles -t codex`.
  loop: "{{ codex_skill_destinations.results | default([]) }}"
  loop_control:
    label: "{{ item.codex_skill_name }}"
  when:
    - item.stat.exists
    - not item.stat.islnk

- name: "{{ role_name }} | Skills | Symlink custom skills from role files"
  ansible.builtin.file:
    src: "{{ codex_skill_source_directory.path }}"
    dest: "{{ codex_skills_dest }}/{{ codex_skill_source_directory.path | basename }}"
    state: link
    force: true
  loop: "{{ codex_skill_source_directories.files | default([]) }}"
  loop_control:
    loop_var: codex_skill_source_directory
    label: "{{ codex_skill_source_directory.path | basename }}"

- name: "{{ role_name }} | Caveman | Ensure external plugin root exists"
  ansible.builtin.file:
    path: "{{ codex_external_plugins_root }}"
    state: directory
    mode: "0755"
  when: codex_caveman_enabled

- name: "{{ role_name }} | Caveman | Clone or update upstream repository"
  ansible.builtin.git:
    repo: "{{ codex_caveman_repo_url }}"
    dest: "{{ codex_caveman_clone_path }}"
    version: "{{ codex_caveman_version }}"
    update: true
    depth: 1
  when: codex_caveman_enabled

- name: "{{ role_name }} | Caveman | Check upstream skill root"
  ansible.builtin.stat:
    path: "{{ codex_caveman_skills_root }}"
  register: codex_caveman_skills_root_directory
  when: codex_caveman_enabled

- name: "{{ role_name }} | Caveman | Fail when upstream skill root is missing"
  ansible.builtin.fail:
    msg: >-
      Caveman skills root {{ codex_caveman_skills_root }} was not found after cloning
      {{ codex_caveman_repo_url }} at {{ codex_caveman_version }}.
  when:
    - codex_caveman_enabled
    - not codex_caveman_skills_root_directory.stat.isdir

- name: "{{ role_name }} | Caveman | Validate upstream skills"
  ansible.builtin.command:
    argv:
      - "{{ ansible_playbook_python }}"
      - "{{ role_path }}/files/scripts/validate_skills.py"
      - "{{ codex_caveman_skills_root }}"
  changed_when: false
  when: codex_caveman_enabled

- name: "{{ role_name }} | Caveman | Check configured upstream skill sources"
  ansible.builtin.stat:
    path: "{{ codex_caveman_skills_root }}/{{ codex_caveman_skill_name }}/SKILL.md"
  loop: "{{ codex_caveman_skill_names }}"
  loop_control:
    loop_var: codex_caveman_skill_name
    label: "{{ codex_caveman_skill_name }}"
  register: codex_caveman_skill_sources
  when: codex_caveman_enabled

- name: "{{ role_name }} | Caveman | Fail when configured upstream skill source is missing"
  ansible.builtin.fail:
    msg: >-
      Configured Caveman skill {{ item.codex_caveman_skill_name }} was not found at
      {{ codex_caveman_skills_root }}/{{ item.codex_caveman_skill_name }}/SKILL.md.
      Update codex_caveman_skill_names or pin a compatible upstream revision.
  loop: "{{ codex_caveman_skill_sources.results | default([]) }}"
  loop_control:
    label: "{{ item.codex_caveman_skill_name }}"
  when:
    - codex_caveman_enabled
    - not item.stat.exists

- name: "{{ role_name }} | Caveman | Check external skill destination paths"
  ansible.builtin.stat:
    path: "{{ codex_skills_dest }}/{{ codex_caveman_skill_name }}"
    follow: false
  loop: "{{ codex_caveman_skill_names }}"
  loop_control:
    loop_var: codex_caveman_skill_name
    label: "{{ codex_caveman_skill_name }}"
  register: codex_caveman_skill_destinations
  when: codex_caveman_enabled

- name: "{{ role_name }} | Caveman | Fail when external skill destination is not a symlink"
  ansible.builtin.fail:
    msg: >-
      External Caveman skill destination {{ codex_skills_dest }}/{{ item.codex_caveman_skill_name }}
      exists and is not a symlink. Move or remove it, then rerun `dotfiles -t codex`.
  loop: "{{ codex_caveman_skill_destinations.results | default([]) }}"
  loop_control:
    label: "{{ item.codex_caveman_skill_name }}"
  when:
    - codex_caveman_enabled
    - item.stat.exists
    - not item.stat.islnk

- name: "{{ role_name }} | Caveman | Symlink external skills into ~/.codex/skills"
  ansible.builtin.file:
    src: "{{ codex_caveman_skills_root }}/{{ codex_caveman_skill_name }}"
    dest: "{{ codex_skills_dest }}/{{ codex_caveman_skill_name }}"
    state: link
    force: true
  loop: "{{ codex_caveman_skill_names }}"
  loop_control:
    loop_var: codex_caveman_skill_name
    label: "{{ codex_caveman_skill_name }}"
  when: codex_caveman_enabled

- name: "{{ role_name }} | Symlink | Check if config.toml already exists"
  ansible.builtin.stat:
    path: "{{ codex_config_dest }}"
  register: codex_config_file

- name: "{{ role_name }} | Symlink | Backup existing config.toml if it is not a symlink"
  ansible.builtin.copy:
    src: "{{ codex_config_dest }}"
    dest: "{{ codex_config_dest }}.backup"
    remote_src: true
    mode: "0644"
  when: codex_config_file.stat.exists and not codex_config_file.stat.islnk

- name: "{{ role_name }} | Symlink | Remove existing config.toml if it is not a symlink"
  ansible.builtin.file:
    path: "{{ codex_config_dest }}"
    state: absent
  when: codex_config_file.stat.exists and not codex_config_file.stat.islnk

- name: "{{ role_name }} | Symlink | Create symlink to config.toml"
  ansible.builtin.file:
    src: "{{ codex_config_source }}"
    dest: "{{ codex_config_dest }}"
    state: link
    force: true

- name: "{{ role_name }} | Symlink | Check if AGENTS.md already exists"
  ansible.builtin.stat:
    path: "{{ codex_agents_dest }}"
  register: codex_agents_file

- name: "{{ role_name }} | Symlink | Backup existing AGENTS.md if it is not a symlink"
  ansible.builtin.copy:
    src: "{{ codex_agents_dest }}"
    dest: "{{ codex_agents_dest }}.backup"
    remote_src: true
    mode: "0644"
  when: codex_agents_file.stat.exists and not codex_agents_file.stat.islnk

- name: "{{ role_name }} | Symlink | Remove existing AGENTS.md if it is not a symlink"
  ansible.builtin.file:
    path: "{{ codex_agents_dest }}"
    state: absent
  when: codex_agents_file.stat.exists and not codex_agents_file.stat.islnk

- name: "{{ role_name }} | Symlink | Create symlink to AGENTS.md"
  ansible.builtin.file:
    src: "{{ codex_agents_source }}"
    dest: "{{ codex_agents_dest }}"
    state: link
    force: true

- name: "{{ role_name }} | Cleanup | Check for legacy managed hooks.json symlink"
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.codex/hooks.json"
    follow: false
  register: codex_legacy_hooks_file

- name: "{{ role_name }} | Cleanup | Remove legacy managed hooks.json symlink"
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.codex/hooks.json"
    state: absent
  when:
    - codex_legacy_hooks_file.stat.exists
    - codex_legacy_hooks_file.stat.islnk
    - codex_legacy_hooks_file.stat.lnk_source | default('') == (role_path ~ '/files/hooks.json')

- name: "{{ role_name }} | Cleanup | Check for legacy managed caveman_session_start.py symlink"
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.codex/caveman_session_start.py"
    follow: false
  register: codex_legacy_hook_script_file

- name: "{{ role_name }} | Cleanup | Remove legacy managed caveman_session_start.py symlink"
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.codex/caveman_session_start.py"
    state: absent
  when:
    - codex_legacy_hook_script_file.stat.exists
    - codex_legacy_hook_script_file.stat.islnk
    - codex_legacy_hook_script_file.stat.lnk_source | default('') == (role_path ~ '/files/scripts/caveman_session_start.py')
