---
role_name: fabric

fabric_source_url: "git+https://github.com/Fabric-Development/fabric.git"
fabric_uv_path: "{{ ansible_facts['user_dir'] }}/.local/bin/uv"
fabric_venv_path: "{{ ansible_facts['user_dir'] }}/.local/share/fabric-awesomewm/venv"
fabric_config_name: awesomewm
fabric_config_path: "{{ ansible_facts['user_dir'] }}/.config/fabric/{{ fabric_config_name }}"
fabric_enable_awesomewm_ui: true

fabric_ubuntu_packages:
  - build-essential
  - git
  - pipx
  - pkg-config
  - python3
  - python3-click
  - python3-dev
  - python3-venv
  - python3-cairo
  - python3-gi
  - python3-gi-cairo
  - python3-loguru
  - python3-psutil
  - python3-xlib
  - gir1.2-gtk-3.0
  - gobject-introspection
  - libgirepository1.0-dev
  - libcairo2-dev
  - libgtk-3-dev
  - libgtk-layer-shell-dev
