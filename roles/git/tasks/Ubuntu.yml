---
# Git installation with sudo fallback for Ubuntu/Debian

- name: "Git | {{ ansible_facts['distribution'] }} | Check if git is already installed"
  ansible.builtin.command: which git
  register: git_check
  changed_when: false
  failed_when: false
  no_log: true

- name: "Git | {{ ansible_facts['distribution'] }} | Install git (system package)"
  ansible.builtin.apt:
    name:
      - git
    state: present
  become: true
  when:
    - can_install_packages | default(false)
    - git_check.rc != 0
  register: git_system_install

- name: "Git | {{ ansible_facts['distribution'] }} | Define verified gitleaks release"
  ansible.builtin.set_fact:
    git_gitleaks_release_version: "8.30.1"
    git_gitleaks_required_scanner_flags:
      - --redact
      - --no-banner
      - --no-color
      - --timeout
      - --config
      - --gitleaks-ignore-path
      - --ignore-gitleaks-allow
      - --report-format
      - --report-path
    git_gitleaks_release_assets:
      x86_64:
        arch: x64
        checksum: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
      aarch64:
        arch: arm64
        checksum: "e4a487ee7ccd7d3a7f7ec08657610aa3606637dab924210b3aee62570fb4b080"
      armv7l:
        arch: armv7
        checksum: "8d39f0d94ba0d774b2282187656fb039a2d82893ec1fd6be7d7121aae759a57d"
      armv6l:
        arch: armv6
        checksum: "5c2a4ee657a27614e10352bed2b8f1018ef9b05fc6c037cf737776bbe1255766"
      i386:
        arch: x32
        checksum: "a87ba11adab22b4d6c6ea28b2da60f09154d5c2fdb44d4b07015d1e0433daecb"
      i686:
        arch: x32
        checksum: "a87ba11adab22b4d6c6ea28b2da60f09154d5c2fdb44d4b07015d1e0433daecb"

- name: "Git | {{ ansible_facts['distribution'] }} | Check active gitleaks dir compatibility"
  ansible.builtin.command:
    argv:
      - gitleaks
      - dir
      - --help
  register: git_gitleaks_active_dir_compatibility_check
  changed_when: false
  failed_when: false
  check_mode: false

- name: "Git | {{ ansible_facts['distribution'] }} | Check active gitleaks stdin compatibility"
  ansible.builtin.command:
    argv:
      - gitleaks
      - stdin
      - --help
  register: git_gitleaks_active_stdin_compatibility_check
  changed_when: false
  failed_when: false
  check_mode: false

- name: "Git | {{ ansible_facts['distribution'] }} | Check user-local gitleaks release version"
  ansible.builtin.command:
    argv:
      - "{{ ansible_facts['env']['HOME'] }}/.local/bin/gitleaks"
      - version
  register: git_gitleaks_local_version_check
  changed_when: false
  failed_when: false
  check_mode: false

- name: "Git | {{ ansible_facts['distribution'] }} | Check user-local gitleaks dir compatibility"
  ansible.builtin.command:
    argv:
      - "{{ ansible_facts['env']['HOME'] }}/.local/bin/gitleaks"
      - dir
      - --help
  register: git_gitleaks_local_dir_compatibility_check
  changed_when: false
  failed_when: false
  check_mode: false

- name: "Git | {{ ansible_facts['distribution'] }} | Check user-local gitleaks stdin compatibility"
  ansible.builtin.command:
    argv:
      - "{{ ansible_facts['env']['HOME'] }}/.local/bin/gitleaks"
      - stdin
      - --help
  register: git_gitleaks_local_stdin_compatibility_check
  changed_when: false
  failed_when: false
  check_mode: false

- name: "Git | {{ ansible_facts['distribution'] }} | Determine compatible gitleaks candidates"
  ansible.builtin.set_fact:
    git_gitleaks_active_compatible: >-
      {{
        git_gitleaks_active_dir_compatibility_check.rc == 0 and
        git_gitleaks_active_stdin_compatibility_check.rc == 0 and
        (
          git_gitleaks_required_scanner_flags |
          reject(
            'in',
            git_gitleaks_active_dir_compatibility_check.stdout ~
            git_gitleaks_active_dir_compatibility_check.stderr
          ) |
          list | length
        ) == 0 and
        (
          git_gitleaks_required_scanner_flags |
          reject(
            'in',
            git_gitleaks_active_stdin_compatibility_check.stdout ~
            git_gitleaks_active_stdin_compatibility_check.stderr
          ) |
          list | length
        ) == 0
      }}
    git_gitleaks_local_fallback_compatible: >-
      {{
        git_gitleaks_local_version_check.rc == 0 and
        (git_gitleaks_local_version_check.stdout | trim) == git_gitleaks_release_version and
        git_gitleaks_local_dir_compatibility_check.rc == 0 and
        git_gitleaks_local_stdin_compatibility_check.rc == 0 and
        (
          git_gitleaks_required_scanner_flags |
          reject(
            'in',
            git_gitleaks_local_dir_compatibility_check.stdout ~
            git_gitleaks_local_dir_compatibility_check.stderr
          ) |
          list | length
        ) == 0 and
        (
          git_gitleaks_required_scanner_flags |
          reject(
            'in',
            git_gitleaks_local_stdin_compatibility_check.stdout ~
            git_gitleaks_local_stdin_compatibility_check.stderr
          ) |
          list | length
        ) == 0
      }}

- name: "Git | {{ ansible_facts['distribution'] }} | Determine gitleaks installation need"
  ansible.builtin.set_fact:
    git_gitleaks_needs_install: >-
      {{
        not (
          git_gitleaks_active_compatible or
          git_gitleaks_local_fallback_compatible
        )
      }}

- name: "Git | {{ ansible_facts['distribution'] }} | Check gitleaks APT package availability"
  ansible.builtin.command:
    argv:
      - apt-cache
      - show
      - gitleaks
  register: git_gitleaks_apt_package
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - git_gitleaks_needs_install
    - can_install_packages | default(false)

- name: "Git | {{ ansible_facts['distribution'] }} | Install gitleaks (system package)"
  ansible.builtin.apt:
    name:
      - gitleaks
    state: present
  become: true
  register: git_gitleaks_system_install
  ignore_errors: true
  when:
    - git_gitleaks_needs_install
    - can_install_packages | default(false)
    - git_gitleaks_apt_package is defined
    - git_gitleaks_apt_package.rc == 0

- name: "Git | {{ ansible_facts['distribution'] }} | Check gitleaks dir compatibility after package installation"
  ansible.builtin.command:
    argv:
      - gitleaks
      - dir
      - --help
  register: git_gitleaks_post_package_dir_compatibility_check
  changed_when: false
  failed_when: false
  check_mode: false
  when: git_gitleaks_needs_install

- name: "Git | {{ ansible_facts['distribution'] }} | Check gitleaks stdin compatibility after package installation"
  ansible.builtin.command:
    argv:
      - gitleaks
      - stdin
      - --help
  register: git_gitleaks_post_package_stdin_compatibility_check
  changed_when: false
  failed_when: false
  check_mode: false
  when: git_gitleaks_needs_install

- name: "Git | {{ ansible_facts['distribution'] }} | Determine gitleaks release fallback need"
  ansible.builtin.set_fact:
    git_gitleaks_needs_fallback: >-
      {{
        git_gitleaks_needs_install and
        not (
          (git_gitleaks_post_package_dir_compatibility_check.rc | default(1)) == 0 and
          (git_gitleaks_post_package_stdin_compatibility_check.rc | default(1)) == 0 and
          (
            git_gitleaks_required_scanner_flags |
            reject(
              'in',
              (git_gitleaks_post_package_dir_compatibility_check.stdout | default('')) ~
              (git_gitleaks_post_package_dir_compatibility_check.stderr | default(''))
            ) |
            list | length
          ) == 0 and
          (
            git_gitleaks_required_scanner_flags |
            reject(
              'in',
              (git_gitleaks_post_package_stdin_compatibility_check.stdout | default('')) ~
              (git_gitleaks_post_package_stdin_compatibility_check.stderr | default(''))
            ) |
            list | length
          ) == 0
        )
      }}

- name: "Git | {{ ansible_facts['distribution'] }} | Select gitleaks release asset"
  ansible.builtin.set_fact:
    git_gitleaks_release_asset: >-
      {{
        git_gitleaks_release_assets[ansible_facts['architecture']] | default({})
      }}
  when: git_gitleaks_needs_fallback

- name: "Git | {{ ansible_facts['distribution'] }} | Fail on unsupported gitleaks release architecture"
  ansible.builtin.fail:
    msg: >-
      Gitleaks {{ git_gitleaks_release_version }} has no configured official
      release asset for architecture {{ ansible_facts['architecture'] }}.
  when:
    - git_gitleaks_needs_fallback
    - git_gitleaks_release_asset | length == 0

- name: "Git | {{ ansible_facts['distribution'] }} | Report gitleaks release fallback in check mode"
  ansible.builtin.debug:
    msg: >-
      Gitleaks is missing or incompatible with the required staged scanner
      flags; would install verified gitleaks {{ git_gitleaks_release_version }}
      in {{ ansible_facts['env']['HOME'] }}/.local/bin.
  when:
    - git_gitleaks_needs_fallback
    - ansible_check_mode

- name: "Git | {{ ansible_facts['distribution'] }} | Install verified gitleaks release"
  when:
    - git_gitleaks_needs_fallback
    - not ansible_check_mode
  block:
    - name: "Git | {{ ansible_facts['distribution'] }} | Create gitleaks temporary directory"
      ansible.builtin.tempfile:
        state: directory
        prefix: gitleaks-
      register: git_gitleaks_temp_dir

    - name: "Git | {{ ansible_facts['distribution'] }} | Download verified gitleaks release"
      ansible.builtin.get_url:
        url: >-
          {{
            'https://github.com/gitleaks/gitleaks/releases/download/v'
            ~ git_gitleaks_release_version
            ~ '/gitleaks_' ~ git_gitleaks_release_version
            ~ '_linux_' ~ git_gitleaks_release_asset.arch ~ '.tar.gz'
          }}
        dest: "{{ git_gitleaks_temp_dir.path }}/gitleaks.tar.gz"
        checksum: "sha256:{{ git_gitleaks_release_asset.checksum }}"
        mode: "0644"

    - name: "Git | {{ ansible_facts['distribution'] }} | Extract verified gitleaks release"
      ansible.builtin.unarchive:
        src: "{{ git_gitleaks_temp_dir.path }}/gitleaks.tar.gz"
        dest: "{{ git_gitleaks_temp_dir.path }}"
        remote_src: true

    - name: "Git | {{ ansible_facts['distribution'] }} | Create user-local binary directory"
      ansible.builtin.file:
        path: "{{ ansible_facts['env']['HOME'] }}/.local/bin"
        state: directory
        mode: "0755"

    - name: "Git | {{ ansible_facts['distribution'] }} | Install verified gitleaks binary"
      ansible.builtin.copy:
        src: "{{ git_gitleaks_temp_dir.path }}/gitleaks"
        dest: "{{ ansible_facts['env']['HOME'] }}/.local/bin/gitleaks"
        mode: "0755"
        remote_src: true

    - name: "Git | {{ ansible_facts['distribution'] }} | Verify gitleaks release version"
      ansible.builtin.command:
        argv:
          - "{{ ansible_facts['env']['HOME'] }}/.local/bin/gitleaks"
          - version
      register: git_gitleaks_fallback_version
      changed_when: false
      failed_when: >-
        git_gitleaks_fallback_version.rc != 0 or
        (git_gitleaks_fallback_version.stdout | trim) != git_gitleaks_release_version

    - name: "Git | {{ ansible_facts['distribution'] }} | Verify effective gitleaks dir compatibility"
      ansible.builtin.command:
        argv:
          - "{{ ansible_facts['env']['HOME'] }}/.local/bin/gitleaks"
          - dir
          - --help
      register: git_gitleaks_fallback_dir_compatibility_check
      changed_when: false
      failed_when: >-
        git_gitleaks_fallback_dir_compatibility_check.rc != 0 or
        (
          git_gitleaks_required_scanner_flags |
          reject(
            'in',
            git_gitleaks_fallback_dir_compatibility_check.stdout ~
            git_gitleaks_fallback_dir_compatibility_check.stderr
          ) |
          list | length
        ) != 0

    - name: "Git | {{ ansible_facts['distribution'] }} | Verify effective gitleaks stdin compatibility"
      ansible.builtin.command:
        argv:
          - "{{ ansible_facts['env']['HOME'] }}/.local/bin/gitleaks"
          - stdin
          - --help
      register: git_gitleaks_fallback_stdin_compatibility_check
      changed_when: false
      failed_when: >-
        git_gitleaks_fallback_stdin_compatibility_check.rc != 0 or
        (
          git_gitleaks_required_scanner_flags |
          reject(
            'in',
            git_gitleaks_fallback_stdin_compatibility_check.stdout ~
            git_gitleaks_fallback_stdin_compatibility_check.stderr
          ) |
          list | length
        ) != 0
  always:
    - name: "Git | {{ ansible_facts['distribution'] }} | Remove gitleaks temporary artifacts"
      ansible.builtin.file:
        path: "{{ git_gitleaks_temp_dir.path }}"
        state: absent
      when:
        - git_gitleaks_temp_dir is defined
        - git_gitleaks_temp_dir.path is defined
- name: "Git | {{ ansible_facts['distribution'] }} | Alternative git installation (no sudo)"
  when:
    - not (can_install_packages | default(false))
    - git_check.rc != 0
  block:
    - name: "Git | Create ~/.local/bin directory"
      ansible.builtin.file:
        path: "{{ ansible_facts['env']['HOME'] }}/.local/bin"
        state: directory
        mode: '0755'

    - name: "Git | Download git from source (requires build tools)"
      ansible.builtin.debug:
        msg:
          - "⚠️  Git is not installed and sudo is not available."

          - ""

          - "To install git manually:"

          - "1. Download from: https://github.com/git/git/releases"

          - "2. Or use a portable git binary"

          - "3. Or ask your system administrator to install git"

          - ""

          - "Some dotfiles features will not work without git."
- name: "Git | {{ ansible_facts['distribution'] }} | Report installation status"
  ansible.builtin.debug:
    msg:
      - "Git installation status:"
      - "- Already installed: {{ '✓' if git_check.rc == 0 else '✗' }}"
      - "- System install attempted: {{ '✓' if git_system_install is defined and git_system_install is succeeded else 'N/A' }}"
      - "- Sudo available: {{ '✓' if can_install_packages | default(false) else '✗' }}"
      - "when: git_check.rc != 0"
