---
- name: "Hammerspoon | MacOSX | Install Hammerspoon"
  community.general.homebrew_cask:
    name: hammerspoon
    state: present

- name: "Hammerspoon | MacOSX | Install Karabiner-Elements"
  community.general.homebrew_cask:
    name: karabiner-elements
    state: present

- name: "Hammerspoon | MacOSX | Ensure ~/.config/karabiner exists"
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.config/karabiner"
    state: directory
    mode: "0755"

- name: "Hammerspoon | MacOSX | Deploy Karabiner Configuration (CapsLock to F13)"
  ansible.builtin.copy:
    src: "karabiner/karabiner.json"
    dest: "{{ ansible_facts['user_dir'] }}/.config/karabiner/karabiner.json"
    mode: "0644"

- name: "Hammerspoon | MacOSX | Ensure ~/.hammerspoon exists"
  ansible.builtin.file:
    name: "{{ ansible_facts['user_dir'] }}/.hammerspoon"
    state: directory
    mode: "0755"

- name: "Hammerspoon | MacOSX | Ensure ~/.hammerspoon/Spoons exists"
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.hammerspoon/Spoons"
    state: directory
    mode: "0755"

- name: "Hammerspoon | MacOSX | Deploy Hammerspoon Configuration"
  ansible.builtin.copy:
    src: "config/"
    dest: "{{ ansible_facts['user_dir'] }}/.hammerspoon"
    mode: "0644"

- name: "Hammerspoon | MacOSX | Download GridLayout.spoon"
  ansible.builtin.get_url:
    url: "https://github.com/jesseleite/GridLayout.spoon/releases/latest/download/GridLayout.spoon.zip"
    dest: "{{ ansible_facts['user_dir'] }}/.hammerspoon/Spoons/GridLayout.spoon.zip"
    mode: "0644"

- name: "Hammerspoon | MacOSX | Ensure ~/.hammerspoon/Spoons/GridLayout.spoon exists"
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.hammerspoon/Spoons/GridLayout.spoon"
    state: directory
    mode: "0755"

- name: "Hammerspoon | MacOSX | Install GridLayout.spoon"
  ansible.builtin.unarchive:
    src: "{{ ansible_facts['user_dir'] }}/.hammerspoon/Spoons/GridLayout.spoon.zip"
    dest: "{{ ansible_facts['user_dir'] }}/.hammerspoon/Spoons/GridLayout.spoon"
    remote_src: true
    mode: "0644"
