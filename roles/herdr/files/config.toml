onboarding = false

[keys]
goto = ["prefix+g", "prefix+o"]
open_notification_target = "prefix+shift+o"

focus_pane_left = ["prefix+h", "ctrl+h"]
focus_pane_down = ["prefix+j", "ctrl+j"]
focus_pane_up = ["prefix+k", "ctrl+k"]
focus_pane_right = ["prefix+l", "ctrl+l"]

navigate_workspace_up = "shift+k"
navigate_workspace_down = "shift+j"
previous_workspace = "prefix+alt+k"
next_workspace = "prefix+alt+j"

previous_tab = ["prefix+p", "alt+shift+h"]
next_tab = ["prefix+n", "alt+shift+l"]

previous_agent = ["prefix+alt+p", "ctrl+alt+k"]
next_agent = ["prefix+alt+n", "ctrl+alt+j"]
focus_agent = "prefix+alt+1..9"

detach = ["prefix+q", "prefix+d"]

[ui]
show_agent_labels_on_pane_borders = true
agent_panel_sort = "priority"
sidebar_width = 38
sidebar_min_width = 26
sidebar_max_width = 48

[ui.sidebar.agents]
row_gap = 0
rows = [
  ["state_icon", "agent", "$model"],
  ["terminal_title_stripped"],
  ["workspace"],
]

[ui.toast]
delivery = "terminal"

[advanced]
scrollback_limit_bytes = 50_000_000

[experimental]
pane_history = true
switch_ascii_input_source_in_prefix = true
