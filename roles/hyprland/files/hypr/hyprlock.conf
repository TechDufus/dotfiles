# TechDufus Hyprlock config.
# Symlinked by the hyprland role.

general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
}

background {
    monitor =
    color = rgba(1e1e2eff)
    blur_passes = 2
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 320, 64
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.25
    dots_center = true
    outer_color = rgba(89b4faee)
    inner_color = rgba(11111bee)
    font_color = rgba(cdd6f4ff)
    fade_on_empty = false
    placeholder_text = Locked
    hide_input = false
    check_color = rgba(f9e2afee)
    fail_color = rgba(f38ba8ee)
    position = 0, -90
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(cdd6f4ff)
    font_size = 72
    font_family = BerkeleyMono Nerd Font
    position = 0, 90
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %-d"
    color = rgba(a6adc8ff)
    font_size = 20
    font_family = BerkeleyMono Nerd Font
    position = 0, 30
    halign = center
    valign = center
}
