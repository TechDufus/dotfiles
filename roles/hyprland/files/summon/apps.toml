[apps.terminal]
key = "t"
exec = "ghostty"
match = [
  "class:com.mitchellh.ghostty",
  "class:ghostty",
  "initialClass:com.mitchellh.ghostty",
  "initialClass:ghostty",
]
workspace = "1"
monitor = "HDMI-A-1"
region = "main"

[apps.browser]
key = "b"
exec = "brave"
match = [
  "class:brave-browser",
  "class:Brave-browser",
  "initialClass:brave-browser",
  "initialClass:Brave-browser",
]
workspace = "2"
monitor = "HDMI-A-1"
region = "wide"

[apps.discord]
key = "d"
exec = "discord"
match = [
  "class:discord",
  "initialClass:discord",
]
workspace = "4"
monitor = "DP-1"
region = "chat"

[apps.signal]
key = "c"
exec = "signal-desktop"
match = [
  "class:signal",
  "class:Signal",
  "initialClass:signal",
  "initialClass:Signal",
]
workspace = "4"
monitor = "DP-1"
region = "chat"

[apps.spotify]
key = "s"
exec = "spotify-launcher"
match = [
  "class:Spotify",
  "class:spotify",
  "initialClass:Spotify",
  "initialClass:spotify",
]
workspace = "5"
monitor = "DP-1"
region = "side"

[apps.obsidian]
key = "n"
exec = "obsidian"
match = [
  "class:obsidian",
  "class:Obsidian",
  "initialClass:obsidian",
  "initialClass:Obsidian",
]
workspace = "3"
monitor = "HDMI-A-1"
region = "side"

[apps.onepassword]
key = "o"
exec = "1password"
match = [
  "class:1Password",
  "class:1password",
  "initialClass:1Password",
  "initialClass:1password",
]
workspace = "1"
monitor = "HDMI-A-1"
region = "center"

[apps.files]
key = "f"
exec = "thunar"
match = [
  "class:Thunar",
  "class:thunar",
  "initialClass:Thunar",
  "initialClass:thunar",
]
workspace = "1"
monitor = "HDMI-A-1"
region = "center"

[apps.steam]
key = "g"
exec = "steam"
match = [
  "class:Steam",
  "class:steam",
  "initialClass:Steam",
  "initialClass:steam",
  "title:Steam",
]
workspace = "6"
monitor = "HDMI-A-1"
