---
- name: "K9s | MacOSX | Install k9s"
  community.general.homebrew:
    name: k9s
    state: present

- name: "K9s | MacOSX | Ensure k9s config directory exists"
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/Library/Application Support/k9s"
    state: directory
    mode: "0755"

- name: "K9s | MacOSX | Ensure k9s skins directory exists"
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/Library/Application Support/k9s/skins"
    state: directory
    mode: "0755"

- name: "K9s | Copy config"
  ansible.builtin.copy:
    dest: "{{ ansible_facts['user_dir'] }}/Library/Application Support/k9s/{{ item }}"
    src: "{{ item }}"
    mode: "0644"
  loop:
    - config.yaml
    - plugins.yaml
    - aliases.yaml

- name: "K9s | Copy skin config"
  ansible.builtin.copy:
    dest: "{{ ansible_facts['user_dir'] }}/Library/Application Support/k9s/skins/{{ item }}"
    src: "{{ item }}"
    mode: "0644"
  loop:
    - catppuccin_mocha.yaml
