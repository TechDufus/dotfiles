---
- name: "{{ role_name }} | {{ ansible_facts['distribution'] }} | Install packages"
  community.general.pacman:
    name:
      - kitty
    state: present
  become: true
  when: can_install_packages | default(false)

- name: "{{ role_name }} | {{ ansible_facts['distribution'] }} | Packages skipped (no sudo)"
  ansible.builtin.debug:
    msg: "Package installation skipped: kitty"
  when: not (can_install_packages | default(false))

- name: "{{ role_name }} | {{ ansible_facts['distribution'] }} | Ensure config directory exists"
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/kitty"
    state: directory
    mode: '0755'

- name: "{{ role_name }} | {{ ansible_facts['distribution'] }} | Deploy kitty.conf"
  ansible.builtin.copy:
    src: "kitty.conf"
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/kitty/kitty.conf"
    mode: '0644'
    backup: yes
