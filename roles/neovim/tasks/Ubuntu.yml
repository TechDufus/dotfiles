---
# Neovim installation with intelligent fallback for Ubuntu/Debian

- name: "Neovim | {{ ansible_facts['distribution'] }} | Check if nvim is already installed"
  ansible.builtin.command: which nvim
  register: nvim_check
  changed_when: false
  failed_when: false
  no_log: true

- name: "Neovim | {{ ansible_facts['distribution'] }} | Install dependencies"
  ansible.builtin.apt:
    name:
      - ansible-lint
      - build-essential
      - cmake
      - curl
      - libtool
      - pkg-config
      - ripgrep
      - unzip
    state: present
    update_cache: true
  become: true
  when: can_install_packages | default(false)
  register: nvim_deps_install

- name: "Neovim | {{ ansible_facts['distribution'] }} | Check tree-sitter CLI version"
  ansible.builtin.command: tree-sitter --version
  register: tree_sitter_cli_check
  changed_when: false
  failed_when: false
  no_log: true

- name: "Neovim | {{ ansible_facts['distribution'] }} | Set tree-sitter CLI facts"
  ansible.builtin.set_fact:
    tree_sitter_cli_min_version: "0.26.1"
    tree_sitter_cli_version: "{{ (tree_sitter_cli_check.stdout | regex_search('\\d+\\.\\d+\\.\\d+')) | default('') }}"
    tree_sitter_cli_arch: >-
      {{ 'x64' if ansible_facts['architecture'] in ['x86_64', 'amd64']
      else 'arm64' if ansible_facts['architecture'] in ['aarch64', 'arm64']
      else '' }}

- name: "Neovim | {{ ansible_facts['distribution'] }} | Install compatible tree-sitter CLI"
  when:
    - can_install_packages | default(false)
    - tree_sitter_cli_arch != ''
    - tree_sitter_cli_check.rc != 0 or tree_sitter_cli_version == '' or (tree_sitter_cli_version is version(tree_sitter_cli_min_version, '<'))
  block:
    - name: "Neovim | {{ ansible_facts['distribution'] }} | Get latest tree-sitter CLI release"
      ansible.builtin.uri:
        url: https://api.github.com/repos/tree-sitter/tree-sitter/releases/latest
        return_content: yes
      register: tree_sitter_cli_release
      no_log: true

    - name: "Neovim | {{ ansible_facts['distribution'] }} | Set tree-sitter CLI download facts"
      ansible.builtin.set_fact:
        tree_sitter_cli_asset_name: "tree-sitter-cli-linux-{{ tree_sitter_cli_arch }}.zip"
        tree_sitter_cli_tmp_archive: "/tmp/tree-sitter-cli-{{ tree_sitter_cli_release.json.tag_name }}.zip"
        tree_sitter_cli_tmp_dir: "/tmp/tree-sitter-cli-{{ tree_sitter_cli_release.json.tag_name }}"

    - name: "Neovim | {{ ansible_facts['distribution'] }} | Resolve tree-sitter CLI asset"
      ansible.builtin.set_fact:
        tree_sitter_cli_download_url: >-
          {{ (tree_sitter_cli_release.json.assets
          | selectattr('name', 'equalto', tree_sitter_cli_asset_name)
          | map(attribute='browser_download_url')
          | first) | default('') }}

    - name: "Neovim | {{ ansible_facts['distribution'] }} | Download tree-sitter CLI"
      ansible.builtin.get_url:
        url: "{{ tree_sitter_cli_download_url }}"
        dest: "{{ tree_sitter_cli_tmp_archive }}"
        mode: "0644"
      when: tree_sitter_cli_download_url != ''

    - name: "Neovim | {{ ansible_facts['distribution'] }} | Create tree-sitter CLI temp directory"
      ansible.builtin.file:
        path: "{{ tree_sitter_cli_tmp_dir }}"
        state: directory
        mode: "0755"
      when: tree_sitter_cli_download_url != ''

    - name: "Neovim | {{ ansible_facts['distribution'] }} | Extract tree-sitter CLI"
      ansible.builtin.unarchive:
        src: "{{ tree_sitter_cli_tmp_archive }}"
        dest: "{{ tree_sitter_cli_tmp_dir }}"
        remote_src: true
      when: tree_sitter_cli_download_url != ''

    - name: "Neovim | {{ ansible_facts['distribution'] }} | Find tree-sitter CLI binary"
      ansible.builtin.find:
        paths: "{{ tree_sitter_cli_tmp_dir }}"
        recurse: true
        patterns: tree-sitter
        file_type: file
      register: tree_sitter_cli_binary
      when: tree_sitter_cli_download_url != ''

    - name: "Neovim | {{ ansible_facts['distribution'] }} | Ensure /usr/local/bin exists"
      ansible.builtin.file:
        path: /usr/local/bin
        state: directory
        mode: "0755"
      become: true
      when:
        - tree_sitter_cli_download_url != ''
        - tree_sitter_cli_binary.matched | default(0) > 0

    - name: "Neovim | {{ ansible_facts['distribution'] }} | Install tree-sitter CLI"
      ansible.builtin.copy:
        src: "{{ tree_sitter_cli_binary.files[0].path }}"
        dest: /usr/local/bin/tree-sitter
        mode: "0755"
        remote_src: true
      become: true
      when:
        - tree_sitter_cli_download_url != ''
        - tree_sitter_cli_binary.matched | default(0) > 0

    - name: "Neovim | {{ ansible_facts['distribution'] }} | Cleanup tree-sitter CLI archive"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ tree_sitter_cli_tmp_archive }}"
        - "{{ tree_sitter_cli_tmp_dir }}"
      when: tree_sitter_cli_download_url != ''

    - name: "Neovim | {{ ansible_facts['distribution'] }} | Warn when tree-sitter CLI asset is unavailable"
      ansible.builtin.debug:
        msg: "Unable to resolve a compatible tree-sitter CLI release asset for architecture {{ ansible_facts['architecture'] }}. Parser auto-install may remain disabled."
      when: tree_sitter_cli_download_url == ''
  rescue:
    - name: "Neovim | {{ ansible_facts['distribution'] }} | Warn when tree-sitter CLI installation fails"
      ansible.builtin.debug:
        msg: "Failed to install a compatible tree-sitter CLI automatically. Neovim will continue, but parser auto-install may remain disabled until tree-sitter 0.26.1+ is installed."

# System-wide installation with sudo
- name: "Neovim | {{ ansible_facts['distribution'] }} | System installation"
  when:
    - can_install_packages | default(false)
    - nvim_check.rc != 0
  block:
    - name: "Neovim | {{ ansible_facts['distribution'] }} | Add APT Repository"
      ansible.builtin.apt_repository:
        repo: ppa:neovim-ppa/unstable
        state: present
        mode: "0644"
      become: true
      register: nvim_repo_add

    - name: "Neovim | {{ ansible_facts['distribution'] }} | Install from repository"
      ansible.builtin.apt:
        name: neovim
        state: present
        update_cache: yes
      become: true
      register: nvim_system_install

# User-local installation without sudo
- name: "Neovim | {{ ansible_facts['distribution'] }} | User-local installation"
  when:
    - not (can_install_packages | default(false))
    - nvim_check.rc != 0
  block:
    - name: "Neovim | Create local directories"
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ ansible_facts['env']['HOME'] }}/.local/bin"
        - "{{ ansible_facts['env']['HOME'] }}/.local/share"
        - "{{ ansible_facts['env']['HOME'] }}/.local/lib"

    - name: "Neovim | Get latest release version"
      ansible.builtin.uri:
        url: https://api.github.com/repos/neovim/neovim/releases/latest
        return_content: yes
      register: nvim_latest_release
      no_log: true

    - name: "Neovim | Set version fact"
      ansible.builtin.set_fact:
        nvim_version: "{{ nvim_latest_release.json.tag_name }}"

    - name: "Neovim | Download AppImage"
      ansible.builtin.get_url:
        url: "https://github.com/neovim/neovim/releases/download/{{ nvim_version }}/nvim.appimage"
        dest: "{{ ansible_facts['env']['HOME'] }}/.local/bin/nvim"
        mode: '0755'
      register: nvim_user_install

    - name: "Neovim | Create nvim symlink for vim compatibility"
      ansible.builtin.file:
        src: "{{ ansible_facts['env']['HOME'] }}/.local/bin/nvim"
        dest: "{{ ansible_facts['env']['HOME'] }}/.local/bin/vim"
        state: link

# Install essential tools that don't require sudo
- name: "Neovim | {{ ansible_facts['distribution'] }} | Install user-local tools"
  when: nvim_check.rc == 0 or nvim_user_install is succeeded or nvim_system_install is succeeded
  block:
    - name: "Neovim | Check for ripgrep"
      ansible.builtin.command: which rg
      register: rg_check
      changed_when: false
      failed_when: false
      no_log: true

    - name: "Neovim | Install ripgrep to user directory"
      when: rg_check.rc != 0
      block:
        - name: "Neovim | Get ripgrep latest release"
          ansible.builtin.uri:
            url: https://api.github.com/repos/BurntSushi/ripgrep/releases/latest
            return_content: yes
          register: rg_latest_release
          no_log: true

        - name: "Neovim | Download and extract ripgrep"
          ansible.builtin.unarchive:
            src: "https://github.com/BurntSushi/ripgrep/releases/download/{{ rg_latest_release.json.tag_name }}/ripgrep-{{ rg_latest_release.json.tag_name }}-x86_64-unknown-linux-musl.tar.gz"
            dest: "{{ ansible_facts['env']['HOME'] }}/.local"
            remote_src: yes
            creates: "{{ ansible_facts['env']['HOME'] }}/.local/bin/rg"
            extra_opts:
              - --strip-components=1
              - --wildcards
              - '*/rg'
              - --transform
              - 's/.*\//bin\//'

# Report installation status
- name: "Neovim | {{ ansible_facts['distribution'] }} | Report installation status"
  ansible.builtin.debug:
    msg:
      - "Neovim installation status:"
      - "- Previously installed: {{ '✓' if nvim_check.rc == 0 else '✗' }}"
      - "- System installation: {{ '✓' if nvim_system_install is defined and nvim_system_install is succeeded else '✗ (no sudo)' if not can_install_packages else '✗' }}"
      - "- User installation: {{ '✓' if nvim_user_install is defined and nvim_user_install is succeeded else 'N/A' }}"
      - "- Location: {{ 'System-wide' if nvim_system_install is defined and nvim_system_install is succeeded else '~/.local/bin' if nvim_user_install is defined and nvim_user_install is succeeded else 'Pre-existing' }}"

      - ""

      - "Note: Make sure ~/.local/bin is in your PATH"
