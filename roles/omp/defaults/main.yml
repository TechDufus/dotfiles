---
role_name: omp

omp_manage_install: true
omp_package: "@oh-my-pi/pi-coding-agent"
omp_package_version: latest
omp_bun_bin: "{{ ansible_facts['env']['HOME'] }}/.bun/bin/bun"
omp_bun_candidate_bins:
  - "{{ omp_bun_bin }}"
  - /opt/homebrew/bin/bun
  - /usr/local/bin/bun
omp_real_bin: "{{ ansible_facts['env']['HOME'] }}/.bun/bin/omp"

# Use omp's documented default home. Do not set PI_CONFIG_DIR/PI_CODING_AGENT_DIR
# by default; raw `omp` should resolve to ~/.omp/agent.
omp_config_root: "{{ ansible_facts['env']['HOME'] }}/.omp"
omp_agent_dir: "{{ omp_config_root }}/agent"
omp_config_path: "{{ omp_agent_dir }}/config.yml"
omp_mcp_config_path: "{{ omp_agent_dir }}/mcp.json"
omp_lsp_config_path: "{{ omp_agent_dir }}/lsp.json"
omp_models_source: "{{ role_path }}/files/models.yml"
omp_models_config_path: "{{ omp_agent_dir }}/models.yml"
omp_overlays_source: "{{ role_path }}/files/overlays"
omp_overlays_dest: "{{ omp_agent_dir }}/overlays"
omp_launchers_source: "{{ role_path }}/files/bin"
omp_launchers_dest: "{{ ansible_facts['env']['HOME'] }}/.local/bin"
omp_local_mode_links:
  - source: "{{ omp_models_source }}"
    dest: "{{ omp_models_config_path }}"
  - source: "{{ omp_overlays_source }}/local-max.yml"
    dest: "{{ omp_overlays_dest }}/local-max.yml"
  - source: "{{ omp_overlays_source }}/local-assist.yml"
    dest: "{{ omp_overlays_dest }}/local-assist.yml"
  - source: "{{ omp_launchers_source }}/omp-local-max"
    dest: "{{ omp_launchers_dest }}/omp-local-max"
  - source: "{{ omp_launchers_source }}/omp-local-assist"
    dest: "{{ omp_launchers_dest }}/omp-local-assist"
omp_rules_source: "{{ role_path }}/files/RULES.md"
omp_rules_dest: "{{ omp_agent_dir }}/RULES.md"
omp_watchdog_source: "{{ role_path }}/files/WATCHDOG.md"
omp_watchdog_dest: "{{ omp_agent_dir }}/WATCHDOG.md"
omp_agents_source: "{{ role_path }}/files/agents"
omp_agents_dest: "{{ omp_agent_dir }}/agents"
omp_profiles_source: "{{ role_path }}/files/profiles"
omp_profiles_dest: "{{ omp_config_root }}/profiles"
omp_skills_source: "{{ role_path }}/files/skills"
omp_skills_dest: "{{ omp_agent_dir }}/skills"
omp_extensions_source: "{{ role_path }}/files/extensions"
omp_extensions_dest: "{{ omp_agent_dir }}/extensions"

# Keep Herdr's official generated OMP lifecycle integration current.
omp_herdr_integration_enabled: true

# Keep the official Herdr skill updated from upstream.
omp_herdr_skill_enabled: true
omp_herdr_skill_repo: "https://github.com/ogulcancelik/herdr.git"
omp_herdr_skill_version: "master"
omp_herdr_skill_checkout_dir: "{{ ansible_facts['env']['HOME'] }}/.local/share/dotfiles/herdr"
omp_herdr_skill_source: "{{ omp_herdr_skill_checkout_dir }}"
omp_herdr_skill_dest: "{{ omp_skills_dest }}/herdr"

# Keep the Worktrunk skill updated from upstream instead of vendoring a stale copy.
omp_worktrunk_skill_enabled: true
omp_worktrunk_skill_repo: "https://github.com/max-sixty/worktrunk.git"
omp_worktrunk_skill_version: "main"
omp_worktrunk_skill_checkout_dir: "{{ ansible_facts['env']['HOME'] }}/.local/share/dotfiles/worktrunk"
omp_worktrunk_skill_source: "{{ omp_worktrunk_skill_checkout_dir }}/skills/worktrunk"
omp_worktrunk_skill_dest: "{{ omp_skills_dest }}/worktrunk"
omp_mcp_schema_url: "https://raw.githubusercontent.com/can1357/oh-my-pi/main/packages/coding-agent/src/config/mcp-schema.json"
omp_managed_mcp_servers:
  playwright:
    type: stdio
    command: bunx
    args:
      - "@playwright/mcp@latest"
  granola:
    type: http
    url: "https://mcp.granola.ai/mcp"
