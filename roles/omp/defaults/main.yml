---
role_name: omp

omp_manage_install: true
omp_package: "@oh-my-pi/pi-coding-agent"
omp_package_version: latest
omp_bun_bin: "{{ ansible_facts['env']['HOME'] }}/.bun/bin/bun"
omp_bun_candidate_bins:
  - "{{ omp_bun_bin }}"
  - /opt/homebrew/bin/bun
  - /usr/local/bin/bun
omp_real_bin: "{{ ansible_facts['env']['HOME'] }}/.bun/bin/omp"

# Use omp's documented default home. Do not set PI_CONFIG_DIR/PI_CODING_AGENT_DIR
# by default; raw `omp` should resolve to ~/.omp/agent.
omp_config_root: "{{ ansible_facts['env']['HOME'] }}/.omp"
omp_agent_dir: "{{ omp_config_root }}/agent"
omp_config_path: "{{ omp_agent_dir }}/config.yml"
omp_mcp_config_path: "{{ omp_agent_dir }}/mcp.json"
omp_mcp_schema_url: "https://raw.githubusercontent.com/can1357/oh-my-pi/main/packages/coding-agent/src/config/mcp-schema.json"
omp_managed_mcp_servers:
  playwright:
    type: stdio
    command: bunx
    args:
      - "@playwright/mcp@latest"
  granola:
    type: http
    url: "https://mcp.granola.ai/mcp"
