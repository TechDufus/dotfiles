# Managed by dotfiles: roles/omp/files/config.yml
modelRoles:
  default: "openai-codex/gpt-5.5:xhigh"
theme:
  dark: "dark-catppuccin"
symbolPreset: "nerd"
defaultThinkingLevel: "xhigh"

contextPromotion:
  enabled: false

compaction:
  enabled: true
  strategy: "context-full"
  thresholdPercent: 50

hideThinkingBlock: true
serviceTier: "none"
disabledProviders:
  - "claude"
  - "claude-plugins"
  - "codex"
  - "opencode"
  - "cursor"
  - "cline"
  - "gemini"
  - "windsurf"
  - "vscode"
  - "github"


marketplace:
  autoUpdate: "auto"

debug:
  enabled: true

bashInterceptor:
  enabled: true

edit:
  streamingAbort: true
  blockAutoGenerated: true

lsp:
  diagnosticsOnWrite: true
  diagnosticsOnEdit: true


startup:
  checkUpdate: false

memory:
  backend: "local"

tools:
  discoveryMode: "off"

web_search:
  enabled: true

browser:
  enabled: true

github:
  enabled: true

renderMermaid:
  enabled: true

calc:
  enabled: true

inspect_image:
  enabled: true

task:
  maxConcurrency: 12
  maxRecursionDepth: 2
  eager: true
  isolation:
    mode: "none"
    merge: "patch"

plan:
  enabled: true

goal:
  enabled: true

skills:
  enableCodexUser: false
  enableClaudeUser: false
  enableClaudeProject: false
  enablePiUser: true
  enablePiProject: true

commands:
  enableClaudeUser: false
  enableClaudeProject: false
  enableOpencodeUser: false
  enableOpencodeProject: false

mcp:
  enableProjectConfig: false
  discoveryMode: false

dev:
  autoqa: false

lastChangelogVersion: "15.1.7"
