---
- name: "{{ role_name }} | Check bun candidate binaries"
  ansible.builtin.stat:
    path: "{{ item }}"
  loop: "{{ omp_bun_candidate_bins | unique }}"
  register: omp_bun_candidates

- name: "{{ role_name }} | Select bun binary"
  ansible.builtin.set_fact:
    omp_effective_bun_bin: >-
      {{
        (
          omp_bun_candidates.results
          | selectattr('stat.exists')
          | map(attribute='item')
          | first
        )
        | default('')
      }}

- name: "{{ role_name }} | Check managed omp binary"
  ansible.builtin.stat:
    path: "{{ omp_real_bin }}"
  register: omp_binary

- name: "{{ role_name }} | Install omp via bun"
  ansible.builtin.command:
    argv:
      - "{{ omp_effective_bun_bin }}"
      - install
      - -g
      - "{{ omp_package }}{{ ('@' ~ omp_package_version) if (omp_package_version | string) != 'latest' else '' }}"
  register: omp_install
  changed_when: omp_install.rc == 0
  when:
    - omp_manage_install | bool
    - omp_effective_bun_bin | length > 0
    - not omp_binary.stat.exists

- name: "{{ role_name }} | Warn if bun is not installed"
  ansible.builtin.debug:
    msg: "WARNING: bun is not installed. Run the bun role before omp or set omp_manage_install=false and provide omp_real_bin."
  when:
    - omp_manage_install | bool
    - omp_effective_bun_bin | length == 0

- name: "{{ role_name }} | Ensure default config directories exist"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0700"
  loop:
    - "{{ omp_config_root }}"
    - "{{ omp_agent_dir }}"

- name: "{{ role_name }} | Check repo omp config"
  ansible.builtin.stat:
    path: "{{ role_path }}/files/config.yml"
    checksum_algorithm: sha256
  register: omp_repo_config
  failed_when: not omp_repo_config.stat.exists

- name: "{{ role_name }} | Check installed omp config"
  ansible.builtin.stat:
    path: "{{ omp_config_path }}"
    follow: false
    checksum_algorithm: sha256
  register: omp_installed_config

- name: "{{ role_name }} | Refuse to overwrite unmanaged omp config"
  ansible.builtin.fail:
    msg: >-
      {{ omp_config_path }} is a regular file and differs from
      {{ role_path }}/files/config.yml. Copy the live changes into the repo file
      before re-running the role, or remove the file to allow the managed symlink.
  when:
    - omp_installed_config.stat.exists
    - omp_installed_config.stat.isreg | default(false)
    - omp_installed_config.stat.checksum != omp_repo_config.stat.checksum

- name: "{{ role_name }} | Link default omp config"
  ansible.builtin.file:
    src: "{{ role_path }}/files/config.yml"
    dest: "{{ omp_config_path }}"
    state: link
    force: true

- name: "{{ role_name }} | Check repo omp lsp config"
  ansible.builtin.stat:
    path: "{{ role_path }}/files/lsp.json"
    checksum_algorithm: sha256
  register: omp_repo_lsp_config
  failed_when: not omp_repo_lsp_config.stat.exists

- name: "{{ role_name }} | Check installed omp lsp config"
  ansible.builtin.stat:
    path: "{{ omp_lsp_config_path }}"
    follow: false
    checksum_algorithm: sha256
  register: omp_installed_lsp_config

- name: "{{ role_name }} | Refuse to overwrite unmanaged omp lsp config"
  ansible.builtin.fail:
    msg: >-
      {{ omp_lsp_config_path }} is a regular file and differs from
      {{ role_path }}/files/lsp.json. Copy the live changes into the repo file
      before re-running the role, or remove the file to allow the managed symlink.
  when:
    - omp_installed_lsp_config.stat.exists
    - omp_installed_lsp_config.stat.isreg | default(false)
    - omp_installed_lsp_config.stat.checksum != omp_repo_lsp_config.stat.checksum

- name: "{{ role_name }} | Link global omp lsp config"
  ansible.builtin.file:
    src: "{{ role_path }}/files/lsp.json"
    dest: "{{ omp_lsp_config_path }}"
    state: link
    force: true

- name: "{{ role_name }} | Check installed omp mcp config"
  ansible.builtin.stat:
    path: "{{ omp_mcp_config_path }}"
    follow: false
  register: omp_installed_mcp_config
  no_log: true

- name: "{{ role_name }} | Refuse symlinked omp mcp config"
  ansible.builtin.fail:
    msg: >-
      {{ omp_mcp_config_path }} is a symlink. Refusing to write MCP config through
      a symlink because OAuth reauthorization may store per-user credentials in
      the target. Replace it with a regular file or remove it and rerun the role.
  when: omp_installed_mcp_config.stat.islnk | default(false)

- name: "{{ role_name }} | Refuse non-file omp mcp config"
  ansible.builtin.fail:
    msg: >-
      {{ omp_mcp_config_path }} exists but is not a regular file. Move it aside
      or replace it with a regular JSON file before re-running the role.
  when:
    - omp_installed_mcp_config.stat.exists
    - not (omp_installed_mcp_config.stat.isreg | default(false))

- name: "{{ role_name }} | Initialize existing omp mcp config"
  ansible.builtin.set_fact:
    omp_existing_mcp_config: {}
  no_log: true

- name: "{{ role_name }} | Read existing omp mcp config"
  ansible.builtin.slurp:
    src: "{{ omp_mcp_config_path }}"
  register: omp_existing_mcp_config_slurp
  when: omp_installed_mcp_config.stat.exists
  no_log: true

- name: "{{ role_name }} | Parse existing omp mcp config"
  ansible.builtin.set_fact:
    omp_existing_mcp_config: "{{ omp_existing_mcp_config_slurp.content | b64decode | from_json }}"
  when: omp_installed_mcp_config.stat.exists
  no_log: true

- name: "{{ role_name }} | Merge managed omp mcp servers"
  ansible.builtin.set_fact:
    omp_merged_mcp_config: >-
      {{
        omp_existing_mcp_config
        | combine({
            '$schema': omp_mcp_schema_url,
            'mcpServers': (
              (omp_existing_mcp_config.mcpServers | default({}, true))
              | combine(omp_managed_mcp_servers, recursive=true)
            )
          }, recursive=true)
      }}
  no_log: true

- name: "{{ role_name }} | Validate managed omp mcp config"
  ansible.builtin.assert:
    that:
      - omp_merged_mcp_config.mcpServers.playwright.type == "stdio"
      - omp_merged_mcp_config.mcpServers.playwright.command == "bunx"
      - '"@playwright/mcp@latest" in omp_merged_mcp_config.mcpServers.playwright.args'
      - omp_merged_mcp_config.mcpServers.granola.type == "http"
      - omp_merged_mcp_config.mcpServers.granola.url == "https://mcp.granola.ai/mcp"
    quiet: true

- name: "{{ role_name }} | Deploy global omp mcp config"
  ansible.builtin.copy:
    content: "{{ omp_merged_mcp_config | to_nice_json }}\n"
    dest: "{{ omp_mcp_config_path }}"
    mode: "0600"
  no_log: true

- name: "{{ role_name }} | Deploy global OMP guidance"
  ansible.builtin.copy:
    src: AGENTS.md
    dest: "{{ omp_agent_dir }}/AGENTS.md"
    mode: "0644"


- name: "{{ role_name }} | Check repo global OMP rules"
  ansible.builtin.stat:
    path: "{{ omp_rules_source }}"
    checksum_algorithm: sha256
  register: omp_repo_rules
  failed_when: not omp_repo_rules.stat.exists

- name: "{{ role_name }} | Check installed global OMP rules"
  ansible.builtin.stat:
    path: "{{ omp_rules_dest }}"
    follow: false
    checksum_algorithm: sha256
  register: omp_installed_rules

- name: "{{ role_name }} | Refuse to overwrite unmanaged global OMP rules"
  ansible.builtin.fail:
    msg: >-
      {{ omp_rules_dest }} is a regular file and differs from
      {{ omp_rules_source }}. Copy the live changes into the repo file before
      re-running the role, or remove the file to allow the managed symlink.
  when:
    - omp_installed_rules.stat.exists
    - omp_installed_rules.stat.isreg | default(false)
    - omp_installed_rules.stat.checksum != omp_repo_rules.stat.checksum

- name: "{{ role_name }} | Link global OMP rules"
  ansible.builtin.file:
    src: "{{ omp_rules_source }}"
    dest: "{{ omp_rules_dest }}"
    state: link
    force: true

- name: "{{ role_name }} | Agents | Ensure global OMP agents directory exists"
  ansible.builtin.file:
    path: "{{ omp_agents_dest }}"
    state: directory
    mode: "0755"

- name: "{{ role_name }} | Agents | Check repo-managed OMP agents source"
  ansible.builtin.stat:
    path: "{{ omp_agents_source }}"
  register: omp_agents_source_dir

- name: "{{ role_name }} | Agents | Find repo-managed OMP agents"
  ansible.builtin.find:
    paths: "{{ omp_agents_source }}"
    file_type: file
    patterns: "*.md"
    recurse: false
  register: omp_agent_source_files
  when: omp_agents_source_dir.stat.isdir | default(false)

- name: "{{ role_name }} | Agents | Find installed OMP agent symlinks"
  ansible.builtin.find:
    paths: "{{ omp_agents_dest }}"
    file_type: link
    recurse: false
  register: omp_installed_agent_symlinks

- name: "{{ role_name }} | Agents | Inspect installed OMP agent symlinks"
  ansible.builtin.stat:
    path: "{{ omp_installed_agent_symlink.path }}"
    follow: false
  loop: "{{ omp_installed_agent_symlinks.files | default([]) }}"
  loop_control:
    loop_var: omp_installed_agent_symlink
    label: "{{ omp_installed_agent_symlink.path | basename }}"
  register: omp_installed_agent_symlink_stats

- name: "{{ role_name }} | Agents | Remove stale repo-managed OMP agent symlinks"
  ansible.builtin.file:
    path: "{{ item.omp_installed_agent_symlink.path }}"
    state: absent
  loop: "{{ omp_installed_agent_symlink_stats.results | default([]) }}"
  loop_control:
    label: "{{ item.omp_installed_agent_symlink.path | basename }}"
  when:
    - item.stat.islnk | default(false)
    - >-
      (item.stat.lnk_source | default('')).startswith((omp_agents_source | realpath) ~ '/')
      or (item.stat.lnk_source | default('')).startswith(omp_agents_source ~ '/')
    - >-
      (item.omp_installed_agent_symlink.path | basename) not in
      (omp_agent_source_files.files | default([]) | map(attribute='path')
      | map('basename') | list)

- name: "{{ role_name }} | Agents | Check repo-managed OMP agent destinations"
  ansible.builtin.stat:
    path: "{{ omp_agents_dest }}/{{ omp_agent_source_file.path | basename }}"
    follow: false
  loop: "{{ omp_agent_source_files.files | default([]) }}"
  loop_control:
    loop_var: omp_agent_source_file
    label: "{{ omp_agent_source_file.path | basename }}"
  register: omp_agent_destinations

- name: "{{ role_name }} | Agents | Remove copied OMP agent destinations before symlinking"
  ansible.builtin.file:
    path: "{{ omp_agents_dest }}/{{ item.omp_agent_source_file.path | basename }}"
    state: absent
  loop: "{{ omp_agent_destinations.results | default([]) }}"
  loop_control:
    label: "{{ item.omp_agent_source_file.path | basename }}"
  when:
    - item.stat.exists
    - not (item.stat.islnk | default(false))

- name: "{{ role_name }} | Agents | Symlink repo-managed OMP agents"
  ansible.builtin.file:
    src: "{{ item.omp_agent_source_file.path }}"
    dest: "{{ omp_agents_dest }}/{{ item.omp_agent_source_file.path | basename }}"
    state: link
    force: true
  loop: "{{ omp_agent_destinations.results | default([]) }}"
  loop_control:
    label: "{{ item.omp_agent_source_file.path | basename }}"
  when: >-
    not (
      ansible_check_mode
      and item.stat.exists
      and not (item.stat.islnk | default(false))
    )

- name: "{{ role_name }} | Skills | Ensure global OMP skills directory exists"
  ansible.builtin.file:
    path: "{{ omp_skills_dest }}"
    state: directory
    mode: "0755"

- name: "{{ role_name }} | Skills | Find repo-managed OMP skills"
  ansible.builtin.find:
    paths: "{{ omp_skills_source }}"
    file_type: directory
    recurse: false
  register: omp_skill_source_directories

- name: "{{ role_name }} | Skills | Check repo-managed OMP skill destinations"
  ansible.builtin.stat:
    path: "{{ omp_skills_dest }}/{{ omp_skill_source_directory.path | basename }}"
    follow: false
  loop: "{{ omp_skill_source_directories.files | default([]) }}"
  loop_control:
    loop_var: omp_skill_source_directory
    label: "{{ omp_skill_source_directory.path | basename }}"
  register: omp_skill_destinations

- name: "{{ role_name }} | Skills | Remove copied OMP skill destinations before symlinking"
  ansible.builtin.file:
    path: "{{ omp_skills_dest }}/{{ item.omp_skill_source_directory.path | basename }}"
    state: absent
  loop: "{{ omp_skill_destinations.results | default([]) }}"
  loop_control:
    label: "{{ item.omp_skill_source_directory.path | basename }}"
  when:
    - item.stat.exists
    - not (item.stat.islnk | default(false))

- name: "{{ role_name }} | Skills | Symlink repo-managed OMP skills"
  ansible.builtin.file:
    src: "{{ item.omp_skill_source_directory.path }}"
    dest: "{{ omp_skills_dest }}/{{ item.omp_skill_source_directory.path | basename }}"
    state: link
    force: true
  loop: "{{ omp_skill_destinations.results | default([]) }}"
  loop_control:
    label: "{{ item.omp_skill_source_directory.path | basename }}"
  when: >-
    not (
      ansible_check_mode
      and item.stat.exists
      and not (item.stat.islnk | default(false))
    )

- name: "{{ role_name }} | Skills | Install Worktrunk skill"
  ansible.builtin.include_tasks: skill_worktrunk.yml
  when: omp_worktrunk_skill_enabled | bool

- name: "{{ role_name }} | Extensions | Ensure global OMP extensions directory exists"
  ansible.builtin.file:
    path: "{{ omp_extensions_dest }}"
    state: directory
    mode: "0755"

- name: "{{ role_name }} | Extensions | Check repo-managed OMP extensions source"
  ansible.builtin.stat:
    path: "{{ omp_extensions_source }}"
  register: omp_extensions_source_dir

- name: "{{ role_name }} | Extensions | Find repo-managed OMP extensions"
  ansible.builtin.find:
    paths: "{{ omp_extensions_source }}"
    file_type: file
    recurse: false
  register: omp_extension_source_files
  when: omp_extensions_source_dir.stat.isdir | default(false)

- name: "{{ role_name }} | Extensions | Find installed OMP extension symlinks"
  ansible.builtin.find:
    paths: "{{ omp_extensions_dest }}"
    file_type: link
    recurse: false
  register: omp_installed_extension_symlinks

- name: "{{ role_name }} | Extensions | Inspect installed OMP extension symlinks"
  ansible.builtin.stat:
    path: "{{ omp_installed_extension_symlink.path }}"
    follow: false
  loop: "{{ omp_installed_extension_symlinks.files | default([]) }}"
  loop_control:
    loop_var: omp_installed_extension_symlink
    label: "{{ omp_installed_extension_symlink.path | basename }}"
  register: omp_installed_extension_symlink_stats

- name: "{{ role_name }} | Extensions | Remove stale repo-managed OMP extension symlinks"
  ansible.builtin.file:
    path: "{{ item.omp_installed_extension_symlink.path }}"
    state: absent
  loop: "{{ omp_installed_extension_symlink_stats.results | default([]) }}"
  loop_control:
    label: "{{ item.omp_installed_extension_symlink.path | basename }}"
  when:
    - item.stat.islnk | default(false)
    - >-
      (item.stat.lnk_source | default('')).startswith((omp_extensions_source | realpath) ~ '/')
      or (item.stat.lnk_source | default('')).startswith(omp_extensions_source ~ '/')
    - >-
      (item.omp_installed_extension_symlink.path | basename) not in
      (omp_extension_source_files.files | default([]) | map(attribute='path')
      | map('basename') | list)

- name: "{{ role_name }} | Extensions | Check repo-managed OMP extension sources"
  ansible.builtin.stat:
    path: "{{ omp_extension_source_file.path }}"
    checksum_algorithm: sha256
  loop: "{{ omp_extension_source_files.files | default([]) }}"
  loop_control:
    loop_var: omp_extension_source_file
    label: "{{ omp_extension_source_file.path | basename }}"
  register: omp_extension_source_stats

- name: "{{ role_name }} | Extensions | Check repo-managed OMP extension destinations"
  ansible.builtin.stat:
    path: "{{ omp_extensions_dest }}/{{ omp_extension_source.omp_extension_source_file.path | basename }}"
    follow: false
    checksum_algorithm: sha256
  loop: "{{ omp_extension_source_stats.results | default([]) }}"
  loop_control:
    loop_var: omp_extension_source
    label: "{{ omp_extension_source.omp_extension_source_file.path | basename }}"
  register: omp_extension_destinations

- name: "{{ role_name }} | Extensions | Refuse to overwrite unmanaged OMP extensions"
  ansible.builtin.fail:
    msg: >-
      {{ item.stat.path }} is a regular file and differs from
      {{ item.omp_extension_source.omp_extension_source_file.path }}. Copy the
      live changes into the repo-managed extension source before re-running the
      role, or remove the file to allow the managed symlink.
  loop: "{{ omp_extension_destinations.results | default([]) }}"
  loop_control:
    label: "{{ item.omp_extension_source.omp_extension_source_file.path | basename }}"
  when:
    - item.stat.exists
    - item.stat.isreg | default(false)
    - item.stat.checksum != item.omp_extension_source.stat.checksum

- name: "{{ role_name }} | Extensions | Remove copied OMP extension files before symlinking"
  ansible.builtin.file:
    path: "{{ omp_extensions_dest }}/{{ item.omp_extension_source.omp_extension_source_file.path | basename }}"
    state: absent
  loop: "{{ omp_extension_destinations.results | default([]) }}"
  loop_control:
    label: "{{ item.omp_extension_source.omp_extension_source_file.path | basename }}"
  when:
    - item.stat.exists
    - item.stat.isreg | default(false)
    - item.stat.checksum == item.omp_extension_source.stat.checksum

- name: "{{ role_name }} | Extensions | Symlink repo-managed OMP extensions"
  ansible.builtin.file:
    src: "{{ item.omp_extension_source_file.path }}"
    dest: "{{ omp_extensions_dest }}/{{ item.omp_extension_source_file.path | basename }}"
    state: link
    force: true
  loop: "{{ omp_extension_source_stats.results | default([]) }}"
  loop_control:
    label: "{{ item.omp_extension_source_file.path | basename }}"

- name: "{{ role_name }} | Profiles | Ensure global OMP profiles directory exists"
  ansible.builtin.file:
    path: "{{ omp_profiles_dest }}"
    state: directory
    mode: "0700"

- name: "{{ role_name }} | Profiles | Check repo-managed OMP profiles source"
  ansible.builtin.stat:
    path: "{{ omp_profiles_source }}"
  register: omp_profiles_source_dir

- name: "{{ role_name }} | Profiles | Find repo-managed OMP profiles"
  ansible.builtin.find:
    paths: "{{ omp_profiles_source }}"
    file_type: directory
    recurse: false
  register: omp_profile_source_directories
  when: omp_profiles_source_dir.stat.isdir | default(false)

- name: "{{ role_name }} | Profiles | Check repo-managed OMP profile configs"
  ansible.builtin.stat:
    path: "{{ omp_profile_source_directory.path }}/agent/config.yml"
  loop: "{{ omp_profile_source_directories.files | default([]) }}"
  loop_control:
    loop_var: omp_profile_source_directory
    label: "{{ omp_profile_source_directory.path | basename }}"
  register: omp_profile_config_sources

- name: "{{ role_name }} | Profiles | Ensure repo-managed OMP profile agent directories exist"
  ansible.builtin.file:
    path: "{{ omp_profiles_dest }}/{{ item.omp_profile_source_directory.path | basename }}/agent"
    state: directory
    mode: "0700"
  loop: "{{ omp_profile_config_sources.results | default([]) }}"
  loop_control:
    label: "{{ item.omp_profile_source_directory.path | basename }}"
  when: item.stat.exists

- name: "{{ role_name }} | Profiles | Symlink repo-managed OMP profile configs"
  ansible.builtin.file:
    src: "{{ item.omp_profile_source_directory.path }}/agent/config.yml"
    dest: "{{ omp_profiles_dest }}/{{ item.omp_profile_source_directory.path | basename }}/agent/config.yml"
    state: link
    force: true
  loop: "{{ omp_profile_config_sources.results | default([]) }}"
  loop_control:
    label: "{{ item.omp_profile_source_directory.path | basename }}"
  when: item.stat.exists

- name: "{{ role_name }} | Validate default omp config"
  ansible.builtin.command:
    argv:
      - "{{ omp_real_bin }}"
      - config
      - list
  environment:
    PI_CONFIG_DIR: ""
    PI_CODING_AGENT_DIR: ""
  changed_when: false
  when:
    - not ansible_check_mode
    - omp_binary.stat.exists or (omp_install.rc | default(1)) == 0
