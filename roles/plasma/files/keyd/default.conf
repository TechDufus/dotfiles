# Managed by the dotfiles Plasma role.
# Wayland-safe summon leader:
# - tap Caps Lock/F13 once, then an app key to emit F13 + that key
# - tap Caps Lock/F13 twice, then a macro key to run the macro action
[ids]
*

[global]
oneshot_timeout = 2000

[main]
capslock = overload(plasma_summon, oneshot(plasma_leader))
f13 = overload(plasma_summon, oneshot(plasma_leader))

[plasma_summon]
t = macro(f13 t)
b = macro(f13 b)
d = macro(f13 d)
c = macro(f13 c)
s = macro(f13 s)
n = macro(f13 n)
o = macro(f13 o)
f = macro(f13 f)
g = macro(f13 g)
esc = clear()
f13 = clear()
capslock = clear()

[plasma_leader]
t = macro(f13 t)
b = macro(f13 b)
d = macro(f13 d)
c = macro(f13 c)
s = macro(f13 s)
n = macro(f13 n)
o = macro(f13 o)
f = macro(f13 f)
g = macro(f13 g)
capslock = oneshot(plasma_macro_action)
f13 = oneshot(plasma_macro_action)
esc = clear()

[plasma_macro_action]
a = command(/usr/local/bin/plasma-summon-keyd run cycle_same_app)
s = command(/usr/local/bin/plasma-summon-keyd run screenshot_area)
e = command(/usr/local/bin/plasma-summon-keyd run emoji_picker)
esc = clear()
f13 = clear()
capslock = clear()
