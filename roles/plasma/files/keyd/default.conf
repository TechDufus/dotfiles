# Managed by the dotfiles Plasma role.
# Wayland-safe laptop summon leader:
# - hold Caps Lock with an app key to emit F13 + that key
# - tap Caps Lock once to emit F13
# - tap Caps Lock twice to emit F16
[ids]
*

[global]
oneshot_timeout = 300

[main]
capslock = overload(plasma_summon, oneshotm(plasma_macro, macro(f13)))

[plasma_summon]
t = macro(f13 t)
b = macro(f13 b)
d = macro(f13 d)
c = macro(f13 c)
s = macro(f13 s)
n = macro(f13 n)
o = macro(f13 o)
f = macro(f13 f)
g = macro(f13 g)

[plasma_macro]
capslock = f16
