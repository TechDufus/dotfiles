[layouts.standard]
label = "Standard Dev"
default = true
cells = ["standard_browser_left", "standard_terminal_right", "standard_utility_overlay"]

[layouts.standard.apps]
terminal = 2
browser = 1
discord = 3
signal = 3
spotify = 3
onepassword = 3
files = 3
obsidian = 3
steam = 3

[layouts.fourk]
label = "4K Workspace"
min_width = 2560
cells = ["main", "side", "top_right", "center_left", "center", "right_small"]

[layouts.fourk.apps]
terminal = 1
browser = 2
discord = 3
signal = 3
spotify = 4
onepassword = 4
files = 5
obsidian = 6
steam = 5

[layouts.hd]
label = "HD Workspace"
min_width = 0
max_width = 2559
cells = ["hd_left_main", "hd_right_side", "hd_float_center"]

[layouts.hd.apps]
terminal = 1
browser = 2
discord = 3
signal = 3
spotify = 3
onepassword = 3
files = 3
obsidian = 3
steam = 3

[layouts.full]
label = "Fullscreen"
min_width = 0
cells = ["full"]

[layouts.full.apps]
terminal = 1
browser = 1
discord = 1
signal = 1
spotify = 1
onepassword = 1
files = 1
obsidian = 1
steam = 1

