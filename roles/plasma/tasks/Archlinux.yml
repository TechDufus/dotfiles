---
- name: "{{ role_name }} | {{ ansible_facts['distribution'] }} | Install Plasma desktop packages"
  community.general.pacman:
    name: "{{ plasma_arch_packages }}"
    state: present
  become: true
  when: can_install_packages | default(false)

- name: "{{ role_name }} | {{ ansible_facts['distribution'] }} | Detect configured display manager"
  ansible.builtin.stat:
    path: /etc/systemd/system/display-manager.service
    follow: false
  register: plasma_display_manager_unit
  become: true
  check_mode: false
  when:
    - can_install_packages | default(false)
    - plasma_enable_sddm | bool

- name: "{{ role_name }} | {{ ansible_facts['distribution'] }} | Enable SDDM display manager"
  ansible.builtin.systemd:
    name: sddm.service
    enabled: true
  become: true
  when:
    - can_install_packages | default(false)
    - plasma_enable_sddm | bool
    - not ansible_check_mode
    - >-
      (not (plasma_display_manager_unit.stat.exists | default(false))) or
      ((plasma_display_manager_unit.stat.lnk_target | default('') | basename) == 'sddm.service')

- name: "{{ role_name }} | {{ ansible_facts['distribution'] }} | Keep existing display manager"
  ansible.builtin.debug:
    msg: >-
      SDDM enablement skipped because display-manager.service already points to
      {{ plasma_display_manager_unit.stat.lnk_target | default('an existing unit') }}.
      Disable that display manager first if you want SDDM.
  when:
    - can_install_packages | default(false)
    - plasma_enable_sddm | bool
    - not ansible_check_mode
    - plasma_display_manager_unit.stat.exists | default(false)
    - (plasma_display_manager_unit.stat.lnk_target | default('') | basename) != 'sddm.service'

- name: "{{ role_name }} | {{ ansible_facts['distribution'] }} | Explain SDDM check-mode skip"
  ansible.builtin.debug:
    msg: "SDDM enablement skipped in check mode; rerun without --check to enable the Plasma login session."
  when:
    - can_install_packages | default(false)
    - plasma_enable_sddm | bool
    - ansible_check_mode

- name: "{{ role_name }} | {{ ansible_facts['distribution'] }} | Packages skipped (no sudo)"
  ansible.builtin.debug:
    msg:
      - "Plasma package installation skipped because package installation is unavailable."
      - "Managed KWin script, summon config, and user service symlinks still run."
  when: not (can_install_packages | default(false))

- name: "{{ role_name }} | {{ ansible_facts['distribution'] }} | Install CapsLock to F13 remapper packages"
  community.general.pacman:
    name: "{{ plasma_capslock_f13_arch_packages }}"
    state: present
  become: true
  when:
    - can_install_packages | default(false)
    - plasma_enable_capslock_f13 | bool

- name: "{{ role_name }} | {{ ansible_facts['distribution'] }} | Ensure keyd config directory exists"
  ansible.builtin.file:
    path: /etc/keyd
    state: directory
    mode: "0755"
  become: true
  when:
    - can_install_packages | default(false)
    - plasma_enable_capslock_f13 | bool

- name: "{{ role_name }} | {{ ansible_facts['distribution'] }} | Map CapsLock to F13 with keyd"
  ansible.builtin.copy:
    src: keyd/default.conf
    dest: /etc/keyd/default.conf
    mode: "0644"
  become: true
  register: plasma_keyd_config
  when:
    - can_install_packages | default(false)
    - plasma_enable_capslock_f13 | bool

- name: "{{ role_name }} | {{ ansible_facts['distribution'] }} | Enable keyd CapsLock to F13 remap"
  ansible.builtin.systemd:
    name: keyd.service
    enabled: true
    state: "{{ 'restarted' if (plasma_keyd_config.changed | default(false)) else 'started' }}"
  become: true
  when:
    - can_install_packages | default(false)
    - plasma_enable_capslock_f13 | bool
    - not ansible_check_mode
