---
- name: "{{ role_name }} | Checking for Distribution Config: {{ ansible_facts['distribution'] }}"
  ansible.builtin.stat:
    path: "{{ role_path }}/tasks/{{ ansible_facts['distribution'] }}.yml"
  register: distribution_config

- name: "{{ role_name }} | Run Tasks: {{ ansible_facts['distribution'] }}"
  ansible.builtin.include_tasks: "{{ ansible_facts['distribution'] }}.yml"
  when: distribution_config.stat.exists

- name: "{{ role_name }} | Ensure local bin exists"
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.local/bin"
    state: directory
    mode: "0755"

- name: "{{ role_name }} | Check legacy gaming health helper"
  ansible.builtin.stat:
    path: "{{ ansible_facts['user_dir'] }}/.local/bin/gaming-health"
    follow: false
  register: steam_legacy_gaming_health

- name: "{{ role_name }} | Remove legacy gaming health helper"
  ansible.builtin.file:
    path: "{{ ansible_facts['user_dir'] }}/.local/bin/gaming-health"
    state: absent
  vars:
    steam_managed_legacy_health_helper_targets:
      - "{{ role_path }}/files/bin/gaming-health"
      - "{{ role_path }}/files/bin/steam-health"
  when:
    - steam_legacy_gaming_health.stat.islnk | default(false)
    - (steam_legacy_gaming_health.stat.lnk_source | default("")) in steam_managed_legacy_health_helper_targets

- name: "{{ role_name }} | Symlink Steam health helper"
  ansible.builtin.file:
    src: "{{ role_path }}/files/bin/steam-health"
    dest: "{{ ansible_facts['user_dir'] }}/.local/bin/steam-health"
    state: link
    force: true

- name: "{{ role_name }} | Ensure Steam health helper is executable"
  ansible.builtin.file:
    path: "{{ role_path }}/files/bin/steam-health"
    mode: "0755"
