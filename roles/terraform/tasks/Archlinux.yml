---
- name: "Terraform | {{ ansible_facts['distribution'] }} | Install Terraform"
  community.general.pacman:
    name: terraform
    state: present
  become: true
  when: can_install_packages | default(false)

- name: "Terraform | {{ ansible_facts['distribution'] }} | Packages skipped (no sudo)"
  ansible.builtin.debug:
    msg: "Package installation skipped: terraform"
  when: not (can_install_packages | default(false))
