---
- name: "{{ role_name }} | Checking for Distribution Config: {{ ansible_facts['distribution'] }}"
  ansible.builtin.stat:
    path: "{{ role_path }}/tasks/{{ ansible_facts['distribution'] }}.yml"
  register: distribution_config

- name: "{{ role_name }} | Run Tasks: {{ ansible_facts['distribution'] }}"
  ansible.builtin.include_tasks: "{{ ansible_facts['distribution'] }}.yml"
  when: distribution_config.stat.exists

- name: "ZSH | Copy .zshrc"
  ansible.builtin.copy:
    src: ".zshrc"
    dest: "{{ ansible_facts['user_dir'] }}/.zshrc"
    mode: "0644"

- name: "ZSH | Copy .p10k.zsh"
  ansible.builtin.copy:
    src: ".p10k.zsh"
    dest: "{{ ansible_facts['user_dir'] }}/.p10k.zsh"
    mode: "0644"

- name: "ZSH | Copy custom zsh config"
  ansible.builtin.copy:
    dest: "{{ ansible_facts['user_dir'] }}/.config/"
    src: "zsh"
    mode: "0644"
    directory_mode: "0755"
    force: true

- name: "ZSH | {{ ansible_facts['distribution'] }} | Identify distribution config"
  ansible.builtin.stat:
    path: "{{ role_path }}/files/os/{{ ansible_facts['distribution'] }}"
  register: zsh_os_distribution_config

- name: "ZSH | {{ ansible_facts['os_family'] }} | Identify os family config"
  ansible.builtin.stat:
    path: "{{ role_path }}/files/os/{{ ansible_facts['os_family'] }}"
  register: zsh_os_family_config
  when: not zsh_os_distribution_config.stat.exists

- name: "ZSH | Calculate os config src"
  ansible.builtin.set_fact:
    zsh_os_config_src: >-
      {{
        (role_path ~ '/files/os/' ~ ansible_facts['distribution'])
        if zsh_os_distribution_config.stat.exists
        else
        (role_path ~ '/files/os/' ~ ansible_facts['os_family'])
      }}
    zsh_os_config_exists: "{{ zsh_os_distribution_config.stat.exists or (zsh_os_family_config.stat.exists | default(false)) }}"

- name: "ZSH | Copy custom zsh config for os: {{ zsh_os_config_src | basename }}"
  ansible.builtin.copy:
    dest: "{{ ansible_facts['user_dir'] }}/.config/zsh/"
    src: "{{ zsh_os_config_src }}/"
    mode: "0644"
    force: true
  when:
    - zsh_os_config_exists
